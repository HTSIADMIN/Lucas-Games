<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — CLAN EMBLEM: DEAD-MANS-HAND -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>@font-face{font-family:"M6X11";src:url("/fonts/m6x11.ttf") format("truetype");}text{font-family:"M6X11",monospace !important;}</style>
  <defs>
    <radialGradient id="dm-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#2a1820"/>
      <stop offset="100%" stop-color="#0a0408"/>
    </radialGradient>
  </defs>

  <!-- Pointed shield -->
  <path d="M 100 12 L 178 32 L 172 110 Q 168 156 100 188 Q 32 156 28 110 L 22 32 Z"
        fill="url(#dm-bg)" stroke="#1a0f08" stroke-width="4"/>
  <path d="M 100 18 L 172 36 L 166 110 Q 162 152 100 182 Q 38 152 34 110 L 28 36 Z"
        fill="none" stroke="#8b3a3a" stroke-width="1.5"/>

  <!-- Bullet hole on shield (battle-worn) -->
  <circle cx="55" cy="50" r="4" fill="#0a0408"/>
  <circle cx="55" cy="50" r="3" fill="#1a0f08"/>
  <g stroke="#3a2820" stroke-width="0.8" fill="none">
    <line x1="55" y1="46" x2="48" y2="40"/>
    <line x1="55" y1="46" x2="62" y2="42"/>
    <line x1="51" y1="50" x2="44" y2="50"/>
  </g>

  <!-- Card 1: Ace of Spades (back, tilted left) -->
  <g transform="translate(58 75) rotate(-18)">
    <rect x="0" y="0" width="48" height="68" rx="3" fill="#1a0f08" stroke="#1a0f08" stroke-width="2"/>
    <rect x="2" y="2" width="44" height="64" rx="2" fill="#fef6e4"/>
    <rect x="2" y="2" width="44" height="64" rx="2" fill="none" stroke="#3a2820" stroke-width="0.5"/>
    <!-- A -->
    <text x="6" y="14" font-family="M6X11, monospace" font-size="11" font-weight="bold" fill="#1a0f08">A</text>
    <!-- mini spade in corner -->
    <path d="M 8 18 Q 6 16 6 18 Q 6 20 8 20 Q 10 20 10 18 Q 10 16 8 18 M 7 19 L 9 19 L 8 22 Z"
          fill="#1a0f08"/>
    <!-- center spade large -->
    <path d="M 24 22 Q 16 30 16 38 Q 16 44 22 44 L 22 50 L 26 50 L 26 44 Q 32 44 32 38 Q 32 30 24 22 Z"
          fill="#1a0f08"/>
    <!-- bottom-right A (rotated) -->
    <text x="42" y="62" text-anchor="end" font-family="M6X11, monospace" font-size="11"
          font-weight="bold" fill="#1a0f08" transform="rotate(180 42 58)">A</text>
  </g>

  <!-- Card 2: 8 of Clubs (mid-back) -->
  <g transform="translate(82 70) rotate(-6)">
    <rect x="0" y="0" width="48" height="68" rx="3" fill="#1a0f08" stroke="#1a0f08" stroke-width="2"/>
    <rect x="2" y="2" width="44" height="64" rx="2" fill="#fef6e4"/>
    <rect x="2" y="2" width="44" height="64" rx="2" fill="none" stroke="#3a2820" stroke-width="0.5"/>
    <text x="6" y="14" font-family="M6X11, monospace" font-size="11" font-weight="bold" fill="#1a0f08">8</text>
    <!-- clubs scattered -->
    <g fill="#1a0f08">
      <circle cx="14" cy="28" r="2.5"/>
      <circle cx="34" cy="28" r="2.5"/>
      <circle cx="14" cy="40" r="2.5"/>
      <circle cx="34" cy="40" r="2.5"/>
      <circle cx="24" cy="34" r="2.5"/>
      <circle cx="14" cy="52" r="2.5"/>
      <circle cx="34" cy="52" r="2.5"/>
      <circle cx="24" cy="44" r="2.5"/>
    </g>
  </g>

  <!-- Card 3: Ace of Hearts (front-mid, slight right) -->
  <g transform="translate(110 68) rotate(8)">
    <rect x="0" y="0" width="48" height="68" rx="3" fill="#1a0f08" stroke="#1a0f08" stroke-width="2"/>
    <rect x="2" y="2" width="44" height="64" rx="2" fill="#fef6e4"/>
    <rect x="2" y="2" width="44" height="64" rx="2" fill="none" stroke="#3a2820" stroke-width="0.5"/>
    <text x="6" y="14" font-family="M6X11, monospace" font-size="11" font-weight="bold" fill="#8b1a1a">A</text>
    <!-- mini heart -->
    <path d="M 8 17 Q 6 17 6 19 Q 6 22 8 24 Q 10 22 10 19 Q 10 17 8 17 Z" fill="#8b1a1a"/>
    <!-- center heart -->
    <path d="M 24 24 Q 16 24 16 32 Q 16 40 24 50 Q 32 40 32 32 Q 32 24 24 24 Z"
          fill="#c83838"/>
    <!-- heart highlight -->
    <ellipse cx="20" cy="30" rx="3" ry="4" fill="#ffb8a8" opacity="0.5"/>
  </g>

  <!-- Card 4: 8 of Diamonds (front-right) -->
  <g transform="translate(132 76) rotate(20)">
    <rect x="0" y="0" width="48" height="68" rx="3" fill="#1a0f08" stroke="#1a0f08" stroke-width="2"/>
    <rect x="2" y="2" width="44" height="64" rx="2" fill="#fef6e4"/>
    <rect x="2" y="2" width="44" height="64" rx="2" fill="none" stroke="#3a2820" stroke-width="0.5"/>
    <text x="6" y="14" font-family="M6X11, monospace" font-size="11" font-weight="bold" fill="#8b1a1a">8</text>
    <!-- diamonds scattered -->
    <g fill="#c83838">
      <path d="M 14 28 L 17 32 L 14 36 L 11 32 Z"/>
      <path d="M 34 28 L 37 32 L 34 36 L 31 32 Z"/>
      <path d="M 14 40 L 17 44 L 14 48 L 11 44 Z"/>
      <path d="M 34 40 L 37 44 L 34 48 L 31 44 Z"/>
      <path d="M 24 34 L 27 38 L 24 42 L 21 38 Z"/>
      <path d="M 14 52 L 17 56 L 14 60 L 11 56 Z"/>
      <path d="M 34 52 L 37 56 L 34 60 L 31 56 Z"/>
      <path d="M 24 46 L 27 50 L 24 54 L 21 50 Z"/>
    </g>
  </g>

  <!-- Smoking gun crossed in front -->
  <g transform="translate(70 110) rotate(-10)">
    <rect x="0" y="0" width="60" height="6" fill="#3a2810" stroke="#1a0f08" stroke-width="1.5"/>
    <rect x="0" y="0" width="60" height="2" fill="#5a4830"/>
    <rect x="-2" y="6" width="14" height="14" fill="#3a2810" stroke="#1a0f08" stroke-width="1.5"/>
    <rect x="-2" y="6" width="14" height="3" fill="#c89a4a"/>
    <!-- grip -->
    <rect x="-12" y="8" width="14" height="20" rx="3" fill="#6b3f24" stroke="#1a0f08" stroke-width="1.5"/>
    <rect x="-12" y="8" width="2" height="20" fill="#a87545"/>
    <!-- smoke wisp -->
    <ellipse cx="65" cy="0" rx="4" ry="2" fill="#fef6e4" opacity="0.4"/>
    <ellipse cx="70" cy="-3" rx="3" ry="1.5" fill="#fef6e4" opacity="0.3"/>
  </g>

  <!-- Banner -->
  <path d="M 24 158 L 100 152 L 176 158 L 168 184 L 100 176 L 32 184 Z"
        fill="#1a0f08" stroke="#8b1a1a" stroke-width="2"/>
  <path d="M 24 158 L 100 152 L 176 158" fill="none" stroke="#e05a3c" stroke-width="0.8" opacity="0.7"/>
  <text x="100" y="172" text-anchor="middle" font-family="M6X11, monospace" font-size="11"
        font-weight="bold" fill="#c83838" letter-spacing="3">DEAD MAN'S HAND</text>
</svg>
