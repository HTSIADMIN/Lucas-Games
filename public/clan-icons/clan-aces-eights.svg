<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — CLAN EMBLEM: ACES-EIGHTS -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>@font-face{font-family:"M6X11";src:url("/fonts/m6x11.ttf") format("truetype");}text{font-family:"M6X11",monospace !important;}</style>
  <defs>
    <radialGradient id="ae-bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3d6b2e"/>
      <stop offset="100%" stop-color="#1f3818"/>
    </radialGradient>
    <linearGradient id="ae-frame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="50%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#7a5510"/>
    </linearGradient>
  </defs>

  <!-- Diamond / kite shield -->
  <path d="M 100 8 L 188 100 L 100 192 L 12 100 Z"
        fill="url(#ae-frame)" stroke="#1a0f08" stroke-width="4"/>
  <path d="M 100 18 L 178 100 L 100 182 L 22 100 Z"
        fill="url(#ae-bg)" stroke="#1a0f08" stroke-width="2"/>
  <!-- inner border -->
  <path d="M 100 26 L 170 100 L 100 174 L 30 100 Z"
        fill="none" stroke="#f5c842" stroke-width="1" opacity="0.6"/>

  <!-- 4 SUITS in corners (small) -->
  <g>
    <!-- top: spade -->
    <g transform="translate(100 36)">
      <path d="M 0 -8 Q -10 0 -10 8 Q -10 14 -4 14 L -4 18 L 4 18 L 4 14 Q 10 14 10 8 Q 10 0 0 -8 Z"
            fill="#1a0f08"/>
    </g>
    <!-- right: diamond -->
    <g transform="translate(160 100)">
      <path d="M 0 -10 L 8 0 L 0 10 L -8 0 Z" fill="#c83838" stroke="#1a0f08" stroke-width="1"/>
    </g>
    <!-- bottom: club -->
    <g transform="translate(100 158)">
      <circle cx="0" cy="-4" r="5" fill="#1a0f08"/>
      <circle cx="-5" cy="3" r="5" fill="#1a0f08"/>
      <circle cx="5" cy="3" r="5" fill="#1a0f08"/>
      <rect x="-2" y="2" width="4" height="8" fill="#1a0f08"/>
    </g>
    <!-- left: heart -->
    <g transform="translate(40 100)">
      <path d="M 0 -6 Q -8 -10 -10 -2 Q -10 6 0 12 Q 10 6 10 -2 Q 8 -10 0 -6 Z"
            fill="#c83838" stroke="#1a0f08" stroke-width="1"/>
    </g>
  </g>

  <!-- THE HAND: 5 cards spread in a fan -->
  <!-- card 1: A of Spades, leftmost -->
  <g transform="translate(54 75) rotate(-35)">
    <rect x="0" y="0" width="36" height="54" rx="3" fill="#1a0f08"/>
    <rect x="2" y="2" width="32" height="50" rx="2" fill="#fef6e4"/>
    <text x="6" y="14" font-family="M6X11, monospace" font-size="11" font-weight="bold" fill="#1a0f08">A</text>
    <path d="M 8 18 Q 6 20 6 22 Q 6 24 8 24 L 8 26 L 10 26 L 10 24 Q 12 24 12 22 Q 12 20 8 18 Z"
          fill="#1a0f08"/>
    <path d="M 18 22 Q 12 28 12 36 Q 12 42 17 42 L 17 46 L 21 46 L 21 42 Q 26 42 26 36 Q 26 28 18 22 Z"
          fill="#1a0f08"/>
  </g>

  <!-- card 2: 8 of Clubs -->
  <g transform="translate(72 70) rotate(-18)">
    <rect x="0" y="0" width="36" height="54" rx="3" fill="#1a0f08"/>
    <rect x="2" y="2" width="32" height="50" rx="2" fill="#fef6e4"/>
    <text x="6" y="14" font-family="M6X11, monospace" font-size="11" font-weight="bold" fill="#1a0f08">8</text>
    <g fill="#1a0f08">
      <circle cx="11" cy="22" r="2"/>
      <circle cx="25" cy="22" r="2"/>
      <circle cx="11" cy="32" r="2"/>
      <circle cx="25" cy="32" r="2"/>
      <circle cx="18" cy="27" r="2"/>
      <circle cx="11" cy="42" r="2"/>
      <circle cx="25" cy="42" r="2"/>
      <circle cx="18" cy="37" r="2"/>
    </g>
  </g>

  <!-- card 3: A of Hearts (CENTER, hero card) -->
  <g transform="translate(94 60)">
    <rect x="-4" y="-4" width="44" height="62" rx="4" fill="#f5c842"/>
    <rect x="0" y="0" width="36" height="54" rx="3" fill="#1a0f08"/>
    <rect x="2" y="2" width="32" height="50" rx="2" fill="#fef6e4"/>
    <text x="6" y="14" font-family="M6X11, monospace" font-size="12" font-weight="bold" fill="#c83838">A</text>
    <path d="M 8 18 Q 5 18 5 22 Q 5 26 8 28 Q 11 26 11 22 Q 11 18 8 18 Z" fill="#c83838"/>
    <!-- big heart -->
    <path d="M 18 22 Q 9 18 9 28 Q 9 38 18 46 Q 27 38 27 28 Q 27 18 18 22 Z"
          fill="#c83838" stroke="#1a0f08" stroke-width="1"/>
    <ellipse cx="14" cy="28" rx="3" ry="4" fill="#ff8868" opacity="0.7"/>
  </g>

  <!-- card 4: 8 of Diamonds -->
  <g transform="translate(114 70) rotate(18)">
    <rect x="0" y="0" width="36" height="54" rx="3" fill="#1a0f08"/>
    <rect x="2" y="2" width="32" height="50" rx="2" fill="#fef6e4"/>
    <text x="6" y="14" font-family="M6X11, monospace" font-size="11" font-weight="bold" fill="#c83838">8</text>
    <g fill="#c83838">
      <path d="M 11 18 L 14 22 L 11 26 L 8 22 Z"/>
      <path d="M 25 18 L 28 22 L 25 26 L 22 22 Z"/>
      <path d="M 11 28 L 14 32 L 11 36 L 8 32 Z"/>
      <path d="M 25 28 L 28 32 L 25 36 L 22 32 Z"/>
      <path d="M 18 23 L 21 27 L 18 31 L 15 27 Z"/>
      <path d="M 11 38 L 14 42 L 11 46 L 8 42 Z"/>
      <path d="M 25 38 L 28 42 L 25 46 L 22 42 Z"/>
      <path d="M 18 33 L 21 37 L 18 41 L 15 37 Z"/>
    </g>
  </g>

  <!-- card 5: J of Diamonds (mystery 5th — varies by legend) -->
  <g transform="translate(132 75) rotate(35)">
    <rect x="0" y="0" width="36" height="54" rx="3" fill="#1a0f08"/>
    <rect x="2" y="2" width="32" height="50" rx="2" fill="#fef6e4"/>
    <text x="6" y="14" font-family="M6X11, monospace" font-size="11" font-weight="bold" fill="#c83838">J</text>
    <path d="M 11 18 L 14 22 L 11 26 L 8 22 Z" fill="#c83838"/>
    <!-- jack illustration (simplified figure) -->
    <rect x="12" y="20" width="12" height="16" fill="#c83838"/>
    <rect x="12" y="20" width="12" height="3" fill="#1a0f08"/>
    <ellipse cx="18" cy="20" rx="4" ry="3" fill="#fbe9c4"/>
    <rect x="12" y="32" width="12" height="2" fill="#1a0f08"/>
    <path d="M 26 38 L 29 42 L 26 46 L 23 42 Z" fill="#c83838"/>
  </g>

  <!-- Poker chips at the bottom -->
  <g transform="translate(64 138)">
    <ellipse cx="0" cy="6" rx="14" ry="3" fill="#1a0f08" opacity="0.5"/>
    <rect x="-13" y="0" width="26" height="6" fill="#8b1a1a" stroke="#1a0f08" stroke-width="1"/>
    <rect x="-13" y="-4" width="26" height="4" fill="#c83838" stroke="#1a0f08" stroke-width="1"/>
    <rect x="-13" y="-4" width="26" height="1" fill="#ff8868"/>
    <g fill="#fef6e4">
      <rect x="-12" y="-3" width="2" height="2"/>
      <rect x="-3" y="-3" width="2" height="2"/>
      <rect x="6" y="-3" width="2" height="2"/>
      <rect x="10" y="-3" width="2" height="2"/>
    </g>
  </g>

  <g transform="translate(132 138)">
    <ellipse cx="0" cy="6" rx="14" ry="3" fill="#1a0f08" opacity="0.5"/>
    <rect x="-13" y="0" width="26" height="6" fill="#143348" stroke="#1a0f08" stroke-width="1"/>
    <rect x="-13" y="-4" width="26" height="4" fill="#5fa8d3" stroke="#1a0f08" stroke-width="1"/>
    <rect x="-13" y="-4" width="26" height="1" fill="#c9e4f2"/>
    <g fill="#fef6e4">
      <rect x="-12" y="-3" width="2" height="2"/>
      <rect x="-3" y="-3" width="2" height="2"/>
      <rect x="6" y="-3" width="2" height="2"/>
      <rect x="10" y="-3" width="2" height="2"/>
    </g>
  </g>

  <!-- Banner across middle -->
  <path d="M 36 145 L 100 138 L 164 145 L 158 162 L 100 156 L 42 162 Z"
        fill="#1a0f08" stroke="#f5c842" stroke-width="1.5"/>
  <text x="100" y="155" text-anchor="middle" font-family="M6X11, monospace" font-size="10"
        font-weight="bold" fill="#f5c842" letter-spacing="3">ACES &amp; EIGHTS</text>
</svg>
