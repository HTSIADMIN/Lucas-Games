<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — CLAN EMBLEM: PROSPECTORS-GUILD -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>@font-face{font-family:"M6X11";src:url("/fonts/m6x11.ttf") format("truetype");}text{font-family:"M6X11",monospace !important;}</style>
  <defs>
    <radialGradient id="pg-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#6b3f24"/>
      <stop offset="60%" stop-color="#3d2418"/>
      <stop offset="100%" stop-color="#1a0f08"/>
    </radialGradient>
    <linearGradient id="pg-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="40%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#7a5510"/>
    </linearGradient>
    <linearGradient id="pg-pick" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a7068"/>
      <stop offset="100%" stop-color="#2a2018"/>
    </linearGradient>
    <linearGradient id="pg-wood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a87545"/>
      <stop offset="100%" stop-color="#3d2418"/>
    </linearGradient>
  </defs>

  <!-- Heater shield -->
  <path d="M 100 12 L 178 28 L 174 110 Q 170 158 100 188 Q 30 158 26 110 L 22 28 Z"
        fill="url(#pg-bg)" stroke="#1a0f08" stroke-width="4"/>
  <path d="M 100 18 L 172 32 L 168 108 Q 164 152 100 180 Q 36 152 32 108 L 28 32 Z"
        fill="none" stroke="#f5c842" stroke-width="1.5"/>

  <!-- Cave/mine arch entrance behind tools -->
  <path d="M 60 100 Q 60 60 100 60 Q 140 60 140 100 L 140 130 L 60 130 Z"
        fill="#1a0f08" opacity="0.7"/>
  <path d="M 64 100 Q 64 64 100 64 Q 136 64 136 100 L 136 128 L 64 128 Z"
        fill="#0a0604" opacity="0.5"/>

  <!-- Torch glow inside mine -->
  <ellipse cx="100" cy="100" rx="20" ry="14" fill="#ffd84d" opacity="0.3"/>
  <ellipse cx="100" cy="100" rx="10" ry="7" fill="#f5c842" opacity="0.5"/>

  <!-- CROSSED PICKAXES (X formation, hero element) -->
  <!-- left pickaxe (going /\ from bottom-left to top-right) -->
  <g transform="translate(100 100) rotate(-45)">
    <!-- handle -->
    <rect x="-50" y="-3" width="100" height="6" rx="1.5" fill="url(#pg-wood)" stroke="#1a0f08" stroke-width="2"/>
    <!-- handle wood grain -->
    <line x1="-48" y1="-2" x2="48" y2="-2" stroke="#6b3f24" stroke-width="0.5"/>
    <line x1="-48" y1="2" x2="48" y2="2" stroke="#1a0f08" stroke-width="0.5"/>
    <!-- handle wrap (leather grip) -->
    <rect x="-12" y="-4" width="24" height="8" fill="#1a0f08"/>
    <line x1="-10" y1="-4" x2="-10" y2="4" stroke="#3a2810" stroke-width="0.5"/>
    <line x1="-6" y1="-4" x2="-6" y2="4" stroke="#3a2810" stroke-width="0.5"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#3a2810" stroke-width="0.5"/>
    <line x1="6" y1="-4" x2="6" y2="4" stroke="#3a2810" stroke-width="0.5"/>

    <!-- pickaxe head (left side) -->
    <path d="M 50 0 L 70 -8 L 80 -10 L 80 10 L 70 8 Z"
          fill="url(#pg-pick)" stroke="#1a0f08" stroke-width="2"/>
    <path d="M 50 0 L 70 -8 L 78 -8 L 70 0 Z" fill="#9a9088" opacity="0.7"/>
    <!-- pickaxe head right side -->
    <path d="M -50 0 L -70 -8 L -80 -10 L -80 10 L -70 8 Z"
          fill="url(#pg-pick)" stroke="#1a0f08" stroke-width="2"/>
    <path d="M -50 0 L -70 -8 L -78 -8 L -70 0 Z" fill="#9a9088" opacity="0.7"/>
  </g>

  <!-- right pickaxe (X partner) -->
  <g transform="translate(100 100) rotate(45)">
    <rect x="-50" y="-3" width="100" height="6" rx="1.5" fill="url(#pg-wood)" stroke="#1a0f08" stroke-width="2"/>
    <line x1="-48" y1="-2" x2="48" y2="-2" stroke="#6b3f24" stroke-width="0.5"/>
    <line x1="-48" y1="2" x2="48" y2="2" stroke="#1a0f08" stroke-width="0.5"/>
    <rect x="-12" y="-4" width="24" height="8" fill="#1a0f08"/>
    <line x1="-10" y1="-4" x2="-10" y2="4" stroke="#3a2810" stroke-width="0.5"/>
    <line x1="-6" y1="-4" x2="-6" y2="4" stroke="#3a2810" stroke-width="0.5"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#3a2810" stroke-width="0.5"/>
    <line x1="6" y1="-4" x2="6" y2="4" stroke="#3a2810" stroke-width="0.5"/>
    <path d="M 50 0 L 70 -8 L 80 -10 L 80 10 L 70 8 Z"
          fill="url(#pg-pick)" stroke="#1a0f08" stroke-width="2"/>
    <path d="M 50 0 L 70 -8 L 78 -8 L 70 0 Z" fill="#9a9088" opacity="0.7"/>
    <path d="M -50 0 L -70 -8 L -80 -10 L -80 10 L -70 8 Z"
          fill="url(#pg-pick)" stroke="#1a0f08" stroke-width="2"/>
    <path d="M -50 0 L -70 -8 L -78 -8 L -70 0 Z" fill="#9a9088" opacity="0.7"/>
  </g>

  <!-- GOLD NUGGET (front-center on the X) -->
  <g transform="translate(100 100)">
    <path d="M -16 -8 L -10 -14 L 0 -16 L 12 -14 L 16 -8 L 14 4 L 10 12 L 0 14 L -10 12 L -16 4 Z"
          fill="url(#pg-gold)" stroke="#1a0f08" stroke-width="2"/>
    <!-- nugget facets -->
    <path d="M -16 -8 L -10 -14 L 0 -16 L -4 -8 L -10 -2 Z"
          fill="#ffe9a8" opacity="0.8"/>
    <path d="M 0 -16 L 12 -14 L 16 -8 L 8 -2 L 0 -8 Z"
          fill="#f5c842"/>
    <path d="M 14 4 L 10 12 L 0 14 L 4 6 L 10 -2 Z"
          fill="#c89a4a"/>
    <path d="M -16 4 L -10 12 L 0 14 L -4 6 L -10 -2 Z"
          fill="#a87545"/>
    <!-- shine highlight -->
    <ellipse cx="-6" cy="-10" rx="3" ry="1.5" fill="#fef6e4" opacity="0.8"/>
  </g>

  <!-- Sparkles around nugget -->
  <g fill="#ffe9a8">
    <path d="M 70 70 L 72 74 L 76 72 L 72 76 L 70 80 L 68 76 L 64 72 L 68 74 Z"/>
    <path d="M 130 70 L 132 74 L 136 72 L 132 76 L 130 80 L 128 76 L 124 72 L 128 74 Z" opacity="0.7"/>
    <path d="M 70 130 L 72 132 L 74 132 L 72 134 L 70 136 L 68 134 L 66 132 L 68 132 Z" opacity="0.5"/>
  </g>

  <!-- Top banner -->
  <path d="M 32 28 L 100 22 L 168 28 L 160 50 L 100 42 L 40 50 Z"
        fill="#3d2418" stroke="#f5c842" stroke-width="1.5"/>
  <text x="100" y="35" text-anchor="middle" font-family="M6X11, monospace" font-size="9"
        font-weight="bold" fill="#f5c842" letter-spacing="2">EST. 1849</text>

  <!-- Bottom banner -->
  <path d="M 30 158 L 100 152 L 170 158 L 162 184 L 100 176 L 38 184 Z"
        fill="#1a0f08" stroke="#f5c842" stroke-width="2"/>
  <text x="100" y="170" text-anchor="middle" font-family="M6X11, monospace" font-size="11"
        font-weight="bold" fill="#ffe9a8" letter-spacing="2">PROSPECTORS GUILD</text>
</svg>
