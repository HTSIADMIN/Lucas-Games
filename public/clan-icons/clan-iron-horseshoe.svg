<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — CLAN EMBLEM: IRON-HORSESHOE -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>@font-face{font-family:"M6X11";src:url("/fonts/m6x11.ttf") format("truetype");}text{font-family:"M6X11",monospace !important;}</style>
  <defs>
    <radialGradient id="ih-bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3d2418"/>
      <stop offset="70%" stop-color="#1a0f08"/>
      <stop offset="100%" stop-color="#0a0604"/>
    </radialGradient>
    <linearGradient id="ih-shoe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="40%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#7a5510"/>
    </linearGradient>
    <linearGradient id="ih-iron" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a8077"/>
      <stop offset="50%" stop-color="#4a4540"/>
      <stop offset="100%" stop-color="#2a1810"/>
    </linearGradient>
  </defs>

  <!-- Shield/crest backdrop (rounded heater shield) -->
  <path d="M 100 14 L 174 28 L 174 100 Q 174 158 100 188 Q 26 158 26 100 L 26 28 Z"
        fill="url(#ih-bg)" stroke="#1a0f08" stroke-width="4"/>
  <path d="M 100 14 L 174 28 L 174 100 Q 174 158 100 188 Q 26 158 26 100 L 26 28 Z"
        fill="none" stroke="#f5c842" stroke-width="1.5"/>

  <!-- Inner border / banner ring -->
  <path d="M 100 22 L 166 34 L 166 100 Q 166 152 100 180 Q 34 152 34 100 L 34 34 Z"
        fill="none" stroke="#6b3f24" stroke-width="2" stroke-dasharray="3 4"/>

  <!-- Horseshoe iron base (back layer for depth) -->
  <path d="M 60 70 Q 60 50 100 50 Q 140 50 140 70 L 140 130 Q 140 140 130 140 L 124 140 L 124 78 Q 124 70 100 70 Q 76 70 76 78 L 76 140 L 70 140 Q 60 140 60 130 Z"
        fill="url(#ih-iron)" transform="translate(2 3)" opacity="0.5"/>

  <!-- Main horseshoe -->
  <path d="M 60 70 Q 60 50 100 50 Q 140 50 140 70 L 140 130 Q 140 140 130 140 L 122 140 L 122 78 Q 122 70 100 70 Q 78 70 78 78 L 78 140 L 70 140 Q 60 140 60 130 Z"
        fill="url(#ih-shoe)" stroke="#1a0f08" stroke-width="2.5"/>

  <!-- Horseshoe inner highlight stroke -->
  <path d="M 65 70 Q 65 56 100 56 Q 135 56 135 70"
        fill="none" stroke="#ffe9a8" stroke-width="1" opacity="0.7"/>

  <!-- Nail holes (8 around the shoe) -->
  <g fill="#1a0f08">
    <circle cx="68"  cy="80"  r="2.5"/>
    <circle cx="68"  cy="100" r="2.5"/>
    <circle cx="68"  cy="120" r="2.5"/>
    <circle cx="74"  cy="135" r="2"/>
    <circle cx="132" cy="80"  r="2.5"/>
    <circle cx="132" cy="100" r="2.5"/>
    <circle cx="132" cy="120" r="2.5"/>
    <circle cx="126" cy="135" r="2"/>
  </g>
  <!-- Nail glints -->
  <g fill="#ffe9a8" opacity="0.6">
    <circle cx="67"  cy="79"  r="0.8"/>
    <circle cx="67"  cy="99"  r="0.8"/>
    <circle cx="131" cy="79"  r="0.8"/>
  </g>

  <!-- Crossed lucky clovers behind shoe -->
  <g fill="#3d6b2e" opacity="0.85">
    <path d="M 92 156 Q 88 152 88 148 Q 92 148 96 152 Q 92 152 92 156 Z"/>
    <path d="M 100 152 Q 96 148 96 144 Q 100 144 104 148 Q 100 148 100 152 Z"/>
    <path d="M 108 156 Q 104 152 104 148 Q 108 148 112 152 Q 108 152 108 156 Z"/>
  </g>

  <!-- Banner ribbon at top -->
  <path d="M 40 28 L 100 22 L 160 28 L 152 42 L 100 36 L 48 42 Z"
        fill="#8b3a3a" stroke="#1a0f08" stroke-width="1.5"/>
  <path d="M 40 28 L 100 22 L 160 28" fill="none" stroke="#e05a3c" stroke-width="1" opacity="0.8"/>
  <text x="100" y="34" text-anchor="middle" font-family="M6X11, monospace" font-size="11"
        font-weight="bold" fill="#ffe9a8" letter-spacing="2">IRON HORSESHOE</text>

  <!-- Bottom banner -->
  <path d="M 60 168 L 140 168 L 134 184 L 100 180 L 66 184 Z"
        fill="#4a2818" stroke="#1a0f08" stroke-width="1.5"/>
  <text x="100" y="178" text-anchor="middle" font-family="M6X11, monospace" font-size="9"
        font-weight="bold" fill="#f5c842" letter-spacing="1.5">EST. ★ LUCK</text>

  <!-- Corner stars -->
  <g fill="#f5c842" opacity="0.9">
    <path d="M 50 56 L 52 62 L 58 62 L 53 66 L 55 72 L 50 68 L 45 72 L 47 66 L 42 62 L 48 62 Z"/>
    <path d="M 150 56 L 152 62 L 158 62 L 153 66 L 155 72 L 150 68 L 145 72 L 147 66 L 142 62 L 148 62 Z"/>
  </g>
</svg>
