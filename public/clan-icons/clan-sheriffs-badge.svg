<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — CLAN EMBLEM: SHERIFFS-BADGE -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>@font-face{font-family:"M6X11";src:url("/fonts/m6x11.ttf") format("truetype");}text{font-family:"M6X11",monospace !important;}</style>
  <defs>
    <radialGradient id="sb-bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#5a3810"/>
      <stop offset="100%" stop-color="#1a0f08"/>
    </radialGradient>
    <radialGradient id="sb-star" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="50%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#7a5510"/>
    </radialGradient>
    <radialGradient id="sb-disc" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffd84d"/>
      <stop offset="100%" stop-color="#5a3810"/>
    </radialGradient>
  </defs>

  <!-- Backdrop circle (the badge mount/disc) -->
  <circle cx="100" cy="100" r="92" fill="url(#sb-bg)" stroke="#1a0f08" stroke-width="4"/>

  <!-- Gold inner disc -->
  <circle cx="100" cy="100" r="84" fill="url(#sb-disc)" stroke="#1a0f08" stroke-width="3"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#7a5510" stroke-width="1"/>

  <!-- Decorative inner ring with text "SHERIFF" + dots around -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#1a0f08" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>

  <!-- THE BIG SHERIFF STAR (5 point with circles at tips) -->
  <!-- Star points -->
  <g>
    <!-- outer star -->
    <path d="M 100 30
             L 116 76
             L 164 76
             L 124 104
             L 140 152
             L 100 124
             L 60 152
             L 76 104
             L 36 76
             L 84 76 Z"
          fill="#1a0f08"/>
    <!-- main star fill -->
    <path d="M 100 36
             L 114 78
             L 158 78
             L 122 102
             L 136 144
             L 100 120
             L 64 144
             L 78 102
             L 42 78
             L 86 78 Z"
          fill="url(#sb-star)" stroke="#1a0f08" stroke-width="2"/>

    <!-- top half lighter / bottom half deeper (depth) -->
    <path d="M 100 36 L 114 78 L 100 78 L 100 36 Z" fill="#ffe9a8" opacity="0.5"/>
    <path d="M 100 36 L 86 78 L 100 78 Z" fill="#ffe9a8" opacity="0.7"/>
    <path d="M 100 120 L 64 144 L 78 102 L 100 102 Z" fill="#c89a4a" opacity="0.5"/>
    <path d="M 100 120 L 136 144 L 122 102 L 100 102 Z" fill="#7a5510" opacity="0.5"/>
  </g>

  <!-- Ball tips on each star point (classic sheriff star) -->
  <g fill="url(#sb-star)" stroke="#1a0f08" stroke-width="2">
    <circle cx="100" cy="30" r="5"/>
    <circle cx="164" cy="76" r="5"/>
    <circle cx="140" cy="152" r="5"/>
    <circle cx="60" cy="152" r="5"/>
    <circle cx="36" cy="76" r="5"/>
  </g>
  <!-- Ball highlights -->
  <g fill="#ffe9a8" opacity="0.8">
    <circle cx="98" cy="28" r="1.5"/>
    <circle cx="162" cy="74" r="1.5"/>
    <circle cx="34" cy="74" r="1.5"/>
  </g>

  <!-- CENTER MEDALLION (engraved) -->
  <circle cx="100" cy="100" r="20" fill="#7a5510" stroke="#1a0f08" stroke-width="2"/>
  <circle cx="100" cy="100" r="17" fill="url(#sb-star)" stroke="#1a0f08" stroke-width="1"/>
  <!-- ring of dots -->
  <g fill="#7a5510">
    <circle cx="115.0" cy="100.0" r="1"/>
    <circle cx="112.99038105676658" cy="107.5" r="1"/>
    <circle cx="107.5" cy="112.99038105676658" r="1"/>
    <circle cx="100.0" cy="115.0" r="1"/>
    <circle cx="92.5" cy="112.99038105676658" r="1"/>
    <circle cx="87.00961894323342" cy="107.5" r="1"/>
    <circle cx="85.0" cy="100.0" r="1"/>
    <circle cx="87.00961894323342" cy="92.5" r="1"/>
    <circle cx="92.5" cy="87.00961894323342" r="1"/>
    <circle cx="100.0" cy="85.0" r="1"/>
    <circle cx="107.5" cy="87.00961894323342" r="1"/>
    <circle cx="112.99038105676658" cy="92.5" r="1"/>
  </g>
  <!-- central engraving: "1" + small star -->
  <text x="100" y="106" text-anchor="middle" font-family="M6X11, monospace" font-size="20"
        font-weight="bold" fill="#7a5510">1</text>

  <!-- Top banner ribbon over the badge (with SHERIFF text) -->
  <path d="M 24 32 L 100 22 L 176 32 L 168 50 L 100 42 L 32 50 Z" fill="#1a0f08" stroke="#7a5510" stroke-width="1.5"/>
  <path d="M 24 32 L 100 22 L 176 32" fill="none" stroke="#c89a4a" stroke-width="0.6" opacity="0.7"/>
  <text x="100" y="36" text-anchor="middle" font-family="M6X11, monospace" font-size="11" font-weight="bold" fill="#f5c842" letter-spacing="4">SHERIFF</text>

  <!-- Bottom banner with LUCAS COUNTY -->
  <path d="M 24 168 L 100 158 L 176 168 L 168 186 L 100 178 L 32 186 Z" fill="#1a0f08" stroke="#7a5510" stroke-width="1.5"/>
  <text x="100" y="172" text-anchor="middle" font-family="M6X11, monospace" font-size="9" font-weight="bold" fill="#f5c842" letter-spacing="3">LUCAS COUNTY</text>

  <!-- corner stars (tiny) -->
  <g fill="#f5c842" opacity="0.8">
    <path d="M 30 30 L 32 36 L 38 36 L 33 40 L 35 46 L 30 42 L 25 46 L 27 40 L 22 36 L 28 36 Z"/>
    <path d="M 170 30 L 172 36 L 178 36 L 173 40 L 175 46 L 170 42 L 165 46 L 167 40 L 162 36 L 168 36 Z"/>
    <path d="M 30 170 L 32 176 L 38 176 L 33 180 L 35 186 L 30 182 L 25 186 L 27 180 L 22 176 L 28 176 Z"/>
    <path d="M 170 170 L 172 176 L 178 176 L 173 180 L 175 186 L 170 182 L 165 186 L 167 180 L 162 176 L 168 176 Z"/>
  </g>
</svg>
