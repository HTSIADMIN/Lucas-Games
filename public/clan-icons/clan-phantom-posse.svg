<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — CLAN EMBLEM: PHANTOM-POSSE -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>@font-face{font-family:"M6X11";src:url("/fonts/m6x11.ttf") format("truetype");}text{font-family:"M6X11",monospace !important;}</style>
  <defs>
    <radialGradient id="ph-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#5a3a78"/>
      <stop offset="60%" stop-color="#2a1a48"/>
      <stop offset="100%" stop-color="#0a0418"/>
    </radialGradient>
    <radialGradient id="ph-mist" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c9b4f2" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#5a3a78" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Pointed shield -->
  <path d="M 100 12 L 178 30 L 178 110 Q 178 158 100 188 Q 22 158 22 110 L 22 30 Z"
        fill="url(#ph-bg)" stroke="#1a0f08" stroke-width="4"/>
  <path d="M 100 18 L 172 34 L 172 108 Q 172 152 100 180 Q 28 152 28 108 L 28 34 Z"
        fill="none" stroke="#c9b4f2" stroke-width="1" opacity="0.6"/>

  <!-- Ethereal mist clouds -->
  <ellipse cx="100" cy="100" rx="60" ry="40" fill="url(#ph-mist)"/>

  <!-- Stars/particles -->
  <g fill="#fef6e4">
    <circle cx="40" cy="50" r="1" opacity="0.9"/>
    <circle cx="160" cy="55" r="1.2" opacity="0.7"/>
    <circle cx="50" cy="80" r="0.6" opacity="0.6"/>
    <circle cx="155" cy="90" r="0.8" opacity="0.8"/>
    <circle cx="35" cy="120" r="0.7" opacity="0.5"/>
    <circle cx="165" cy="130" r="0.6" opacity="0.6"/>
    <circle cx="100" cy="40" r="0.8" opacity="0.7"/>
  </g>

  <!-- GHOST RIDER — translucent figure -->
  <g opacity="0.85">
    <!-- horse body -->
    <ellipse cx="100" cy="115" rx="40" ry="14" fill="#c9b4f2" stroke="#5a3a78" stroke-width="1.5"/>
    <!-- horse legs (wispy, fading) -->
    <g fill="#c9b4f2" stroke="#5a3a78" stroke-width="1">
      <path d="M 75 125 Q 73 140 70 152 Q 76 154 78 140 Z" opacity="0.8"/>
      <path d="M 85 128 Q 83 142 80 158 Q 86 160 88 144 Z" opacity="0.6"/>
      <path d="M 115 128 Q 117 142 120 158 Q 114 160 112 144 Z" opacity="0.6"/>
      <path d="M 125 125 Q 127 140 130 152 Q 124 154 122 140 Z" opacity="0.8"/>
    </g>
    <!-- horse neck + head -->
    <path d="M 138 110 L 158 90 Q 164 86 160 96 L 154 108 L 144 116 Z"
          fill="#c9b4f2" stroke="#5a3a78" stroke-width="1.5"/>
    <!-- horse mane (wispy) -->
    <path d="M 150 90 L 144 80 L 138 88 L 142 96 Z" fill="#fef6e4" opacity="0.7"/>
    <!-- horse eye (glowing) -->
    <circle cx="155" cy="98" r="2" fill="#fef6e4"/>
    <circle cx="155" cy="98" r="1" fill="#5fdcff"/>
    <!-- horse tail wisps -->
    <path d="M 60 110 Q 40 100 30 120 Q 50 118 60 122 Z"
          fill="#c9b4f2" stroke="#5a3a78" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Phantom rider (skeleton with hat) -->
  <g transform="translate(96 64)" opacity="0.95">
    <!-- coat / cloak -->
    <path d="M -8 14 L -16 32 L -10 50 L 18 50 L 24 32 L 16 14 Z"
          fill="#3a1a4a" stroke="#0a0418" stroke-width="1.5"/>
    <!-- coat highlights (mist) -->
    <path d="M -8 14 L -16 32 L -10 50 L 4 50 L 4 14 Z"
          fill="#5a3a78" opacity="0.7"/>

    <!-- skeletal hands (gripping reins) -->
    <ellipse cx="22" cy="36" rx="4" ry="5" fill="#fef6e4" stroke="#1a0f08" stroke-width="0.8"/>
    <g fill="#1a0f08">
      <rect x="20" y="34" width="0.6" height="3"/>
      <rect x="22" y="34" width="0.6" height="3"/>
      <rect x="24" y="34" width="0.6" height="3"/>
    </g>

    <!-- skull -->
    <ellipse cx="4" cy="6" rx="9" ry="10" fill="#fef6e4" stroke="#1a0f08" stroke-width="1.5"/>
    <!-- jaw -->
    <path d="M -2 12 L 10 12 L 8 18 L 0 18 Z" fill="#fef6e4" stroke="#1a0f08" stroke-width="1"/>
    <line x1="-2" y1="14" x2="10" y2="14" stroke="#1a0f08" stroke-width="0.5"/>
    <!-- eye sockets (glowing) -->
    <ellipse cx="0" cy="6" rx="2.5" ry="3" fill="#1a0f08"/>
    <ellipse cx="8" cy="6" rx="2.5" ry="3" fill="#1a0f08"/>
    <circle cx="0" cy="6" r="1" fill="#5fdcff"/>
    <circle cx="8" cy="6" r="1" fill="#5fdcff"/>
    <!-- nose -->
    <path d="M 4 8 L 3 11 L 5 11 Z" fill="#1a0f08"/>
    <!-- teeth -->
    <g stroke="#1a0f08" stroke-width="0.4">
      <line x1="0" y1="14" x2="0" y2="16"/>
      <line x1="3" y1="14" x2="3" y2="16"/>
      <line x1="5" y1="14" x2="5" y2="16"/>
      <line x1="8" y1="14" x2="8" y2="16"/>
    </g>

    <!-- COWBOY HAT -->
    <ellipse cx="4" cy="-3" rx="14" ry="2" fill="#1a0f08"/>
    <path d="M -3 -2 L -3 -10 Q -2 -14 4 -14 Q 10 -14 11 -10 L 11 -2 Z"
          fill="#1a0f08" stroke="#0a0418" stroke-width="1"/>
    <!-- hat band (silver skull) -->
    <rect x="-3" y="-4" width="14" height="2" fill="#3a2a4a"/>
  </g>

  <!-- Wispy trail behind -->
  <g fill="#c9b4f2" opacity="0.4">
    <ellipse cx="40" cy="125" rx="18" ry="6"/>
    <ellipse cx="22" cy="130" rx="14" ry="4"/>
  </g>

  <!-- Banner -->
  <path d="M 24 156 L 100 150 L 176 156 L 168 184 L 100 178 L 32 184 Z"
        fill="#0a0418" stroke="#5a3a78" stroke-width="2"/>
  <text x="100" y="170" text-anchor="middle" font-family="M6X11, monospace" font-size="11"
        font-weight="bold" fill="#c9b4f2" letter-spacing="3">PHANTOM POSSE</text>
</svg>
