<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — CLAN EMBLEM: SAGUARO-BROTHERHOOD -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>@font-face{font-family:"M6X11";src:url("/fonts/m6x11.ttf") format("truetype");}text{font-family:"M6X11",monospace !important;}</style>
  <defs>
    <radialGradient id="sg-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="50%" stop-color="#c8941d"/>
      <stop offset="100%" stop-color="#7a5510"/>
    </radialGradient>
    <linearGradient id="sg-cactus" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8aff5a"/>
      <stop offset="40%" stop-color="#3d6b2e"/>
      <stop offset="100%" stop-color="#1f3818"/>
    </linearGradient>
  </defs>

  <!-- Sun-shaped shield (rounded with rays) -->
  <g>
    <!-- sun rays around the back -->
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(0.0 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(22.5 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(45.0 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(67.5 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(90.0 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(112.5 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(135.0 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(157.5 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(180.0 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(202.5 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(225.0 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(247.5 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(270.0 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(292.5 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(315.0 100 100)"/>
    <path d="M 100 10 L 105 30 L 95 30 Z" fill="#f5c842" stroke="#1a0f08" stroke-width="1" transform="rotate(337.5 100 100)"/>
  </g>

  <!-- Main circular shield -->
  <circle cx="100" cy="100" r="78" fill="url(#sg-bg)" stroke="#1a0f08" stroke-width="4"/>
  <circle cx="100" cy="100" r="74" fill="none" stroke="#7a5510" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#fef6e4" stroke-width="0.6" opacity="0.5"/>

  <!-- Distant mesa in background -->
  <g fill="#a87545" opacity="0.7">
    <path d="M 30 130 L 50 110 L 70 115 L 100 105 L 130 115 L 150 110 L 170 130 L 170 140 L 30 140 Z"/>
  </g>
  <!-- mesa shadow stripes -->
  <g fill="#6b3f24" opacity="0.5">
    <rect x="40" y="118" width="120" height="1.5"/>
    <rect x="50" y="125" width="100" height="1"/>
  </g>

  <!-- Sandy ground plane -->
  <path d="M 30 140 L 170 140 L 170 168 Q 170 174 165 174 L 35 174 Q 30 174 30 168 Z"
        fill="#d4a574"/>
  <!-- ground texture dots -->
  <g fill="#a87545" opacity="0.6">
    <circle cx="50" cy="150" r="1"/>
    <circle cx="80" cy="155" r="1.2"/>
    <circle cx="120" cy="150" r="1"/>
    <circle cx="155" cy="158" r="1.5"/>
    <circle cx="42" cy="162" r="1"/>
  </g>

  <!-- THREE SAGUAROS standing in brotherhood -->
  <!-- left saguaro (smaller, outer) -->
  <g transform="translate(50 70)">
    <rect x="0" y="0" width="9" height="65" rx="4.5" fill="url(#sg-cactus)" stroke="#1a0f08" stroke-width="1.5"/>
    <!-- arm -->
    <path d="M 0 30 L -10 30 L -10 16 L -6 16 L -6 26 L 0 26 Z"
          fill="url(#sg-cactus)" stroke="#1a0f08" stroke-width="1.5"/>
    <!-- vertical ribs -->
    <line x1="3" y1="3" x2="3" y2="62" stroke="#1f3818" stroke-width="0.6"/>
    <line x1="6" y1="3" x2="6" y2="62" stroke="#1f3818" stroke-width="0.6"/>
    <!-- spines (small dots) -->
    <g fill="#fef6e4" opacity="0.8">
      <circle cx="2" cy="10" r="0.5"/>
      <circle cx="7" cy="20" r="0.5"/>
      <circle cx="3" cy="40" r="0.5"/>
    </g>
    <!-- flower top (white blossom) -->
    <circle cx="4.5" cy="-2" r="3" fill="#fef6e4" stroke="#1a0f08" stroke-width="0.8"/>
    <circle cx="4.5" cy="-2" r="1.5" fill="#f5c842"/>
  </g>

  <!-- center saguaro (tallest) -->
  <g transform="translate(96 50)">
    <rect x="0" y="0" width="11" height="86" rx="5.5" fill="url(#sg-cactus)" stroke="#1a0f08" stroke-width="2"/>
    <!-- arm L -->
    <path d="M 0 30 L -14 30 L -14 10 L -8 10 L -8 24 L 0 24 Z"
          fill="url(#sg-cactus)" stroke="#1a0f08" stroke-width="1.5"/>
    <!-- arm R -->
    <path d="M 11 38 L 24 38 L 24 18 L 18 18 L 18 32 L 11 32 Z"
          fill="url(#sg-cactus)" stroke="#1a0f08" stroke-width="1.5"/>
    <!-- ribs -->
    <line x1="3" y1="3" x2="3" y2="83" stroke="#1f3818" stroke-width="0.7"/>
    <line x1="6" y1="3" x2="6" y2="83" stroke="#1f3818" stroke-width="0.7"/>
    <line x1="9" y1="3" x2="9" y2="83" stroke="#1f3818" stroke-width="0.7"/>
    <!-- arm ribs -->
    <line x1="-12" y1="12" x2="-12" y2="28" stroke="#1f3818" stroke-width="0.6"/>
    <line x1="22" y1="20" x2="22" y2="36" stroke="#1f3818" stroke-width="0.6"/>
    <!-- spines -->
    <g fill="#fef6e4" opacity="0.8">
      <circle cx="3" cy="15" r="0.5"/>
      <circle cx="9" cy="25" r="0.5"/>
      <circle cx="3" cy="45" r="0.5"/>
      <circle cx="9" cy="60" r="0.5"/>
      <circle cx="5" cy="75" r="0.5"/>
    </g>
    <!-- top flower (red) -->
    <circle cx="5.5" cy="-3" r="4" fill="#c83838" stroke="#1a0f08" stroke-width="1"/>
    <circle cx="5.5" cy="-3" r="2" fill="#ffd84d"/>
  </g>

  <!-- right saguaro -->
  <g transform="translate(135 78)">
    <rect x="0" y="0" width="9" height="58" rx="4.5" fill="url(#sg-cactus)" stroke="#1a0f08" stroke-width="1.5"/>
    <!-- arm R -->
    <path d="M 9 25 L 19 25 L 19 12 L 14 12 L 14 21 L 9 21 Z"
          fill="url(#sg-cactus)" stroke="#1a0f08" stroke-width="1.5"/>
    <line x1="3" y1="3" x2="3" y2="55" stroke="#1f3818" stroke-width="0.6"/>
    <line x1="6" y1="3" x2="6" y2="55" stroke="#1f3818" stroke-width="0.6"/>
    <g fill="#fef6e4" opacity="0.8">
      <circle cx="2" cy="14" r="0.5"/>
      <circle cx="6" cy="30" r="0.5"/>
      <circle cx="3" cy="45" r="0.5"/>
    </g>
    <!-- top -->
    <circle cx="4.5" cy="-2" r="3" fill="#fef6e4" stroke="#1a0f08" stroke-width="0.8"/>
    <circle cx="4.5" cy="-2" r="1.5" fill="#f5c842"/>
  </g>

  <!-- Banner top -->
  <path d="M 30 30 L 100 22 L 170 30 L 162 50 L 100 42 L 38 50 Z"
        fill="#3d6b2e" stroke="#1a0f08" stroke-width="2"/>
  <text x="100" y="36" text-anchor="middle" font-family="M6X11, monospace" font-size="9"
        font-weight="bold" fill="#fef6e4" letter-spacing="2">BROTHERHOOD</text>

  <!-- Banner bottom -->
  <path d="M 36 168 L 100 162 L 164 168 L 158 188 L 100 180 L 42 188 Z"
        fill="#1f3818" stroke="#1a0f08" stroke-width="2"/>
  <text x="100" y="176" text-anchor="middle" font-family="M6X11, monospace" font-size="11"
        font-weight="bold" fill="#8aff5a" letter-spacing="3">SAGUARO</text>
</svg>
