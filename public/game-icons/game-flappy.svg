<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — GAME ICON: FLAPPY (frontier twist — bird dodges saguaros) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- ===== SKY BACKGROUND ===== -->
  <rect x="2" y="2" width="44" height="44" fill="#5fa8d3"/>
  <rect x="2" y="2" width="44" height="6"  fill="#c9e4f2"/>
  <rect x="2" y="40" width="44" height="6" fill="#a87545"/>
  <rect x="2" y="2" width="44" height="44" fill="none" stroke="#1a0f08" stroke-width="1"/>

  <!-- distant mountain silhouette -->
  <polygon points="2,16 6,12 10,15 14,11 18,14 22,12 26,15 30,11 34,14 38,12 42,15 46,16 46,20 2,20"
           fill="#6b3f24" opacity="0.5"/>

  <!-- clouds -->
  <g fill="#fef6e4" opacity="0.85">
    <rect x="36" y="8"  width="6" height="2"/>
    <rect x="38" y="6"  width="4" height="2"/>
    <rect x="6"  y="14" width="4" height="1"/>
  </g>

  <!-- sun -->
  <ellipse cx="40" cy="6" rx="4" ry="3" fill="#ffd84d"/>
  <ellipse cx="39" cy="5" rx="2" ry="1" fill="#ffe9a8"/>

  <!-- ground stripe -->
  <rect x="2" y="40" width="44" height="1" fill="#6b3f24"/>
  <g fill="#3d2418" opacity="0.5">
    <rect x="4"  y="43" width="2" height="1"/>
    <rect x="14" y="44" width="3" height="1"/>
    <rect x="26" y="43" width="2" height="1"/>
    <rect x="38" y="44" width="3" height="1"/>
  </g>

  <!-- ===== TOP PIPE (saguaro cactus, hanging down) ===== -->
  <g transform="translate(28 2)">
    <!-- main column -->
    <rect x="0"  y="0"  width="8" height="20" fill="#1a0f08"/>
    <rect x="1"  y="0"  width="6" height="20" fill="#3d6b2e"/>
    <!-- highlight stripe -->
    <rect x="1"  y="0"  width="1" height="20" fill="#6ba84f"/>
    <!-- shadow stripe -->
    <rect x="6"  y="0"  width="1" height="20" fill="#1f3818"/>
    <!-- cactus ribs (vertical lines) -->
    <g fill="#1f3818">
      <rect x="3" y="2"  width="1" height="16"/>
      <rect x="5" y="4"  width="1" height="14"/>
    </g>
    <!-- cactus arm (sticking left) -->
    <rect x="-4" y="6"  width="4" height="6" fill="#1a0f08"/>
    <rect x="-3" y="7"  width="3" height="5" fill="#3d6b2e"/>
    <rect x="-3" y="7"  width="1" height="5" fill="#6ba84f"/>
    <rect x="-4" y="3"  width="2" height="3" fill="#1a0f08"/>
    <rect x="-3" y="4"  width="1" height="3" fill="#3d6b2e"/>
    <!-- pipe rim/cap -->
    <rect x="-1" y="18" width="10" height="3" fill="#1a0f08"/>
    <rect x="0"  y="19" width="8"  height="1" fill="#1f3818"/>
  </g>

  <!-- ===== BOTTOM PIPE (saguaro, growing up) ===== -->
  <g transform="translate(28 28)">
    <!-- pipe rim/cap -->
    <rect x="-1" y="0"  width="10" height="3" fill="#1a0f08"/>
    <rect x="0"  y="1"  width="8"  height="1" fill="#1f3818"/>
    <!-- main column -->
    <rect x="0"  y="3"  width="8" height="14" fill="#1a0f08"/>
    <rect x="1"  y="3"  width="6" height="14" fill="#3d6b2e"/>
    <rect x="1"  y="3"  width="1" height="14" fill="#6ba84f"/>
    <rect x="6"  y="3"  width="1" height="14" fill="#1f3818"/>
    <!-- ribs -->
    <g fill="#1f3818">
      <rect x="3" y="5"  width="1" height="11"/>
      <rect x="5" y="5"  width="1" height="11"/>
    </g>
    <!-- cactus arm right -->
    <rect x="8"  y="5"  width="4" height="5" fill="#1a0f08"/>
    <rect x="8"  y="6"  width="3" height="4" fill="#3d6b2e"/>
    <rect x="8"  y="6"  width="1" height="4" fill="#6ba84f"/>
    <rect x="10" y="2"  width="2" height="4" fill="#1a0f08"/>
    <rect x="10" y="3"  width="1" height="3" fill="#3d6b2e"/>
  </g>

  <!-- ===== BIRD (yellow, with cowboy hat, mid-flap) ===== -->
  <g transform="translate(11 18)">
    <!-- shadow -->
    <ellipse cx="6" cy="11" rx="5" ry="0.8" fill="#1a0f08" opacity="0.4"/>

    <!-- body outline -->
    <rect x="2"  y="3"  width="9" height="7" fill="#1a0f08"/>
    <!-- body fill -->
    <rect x="3"  y="4"  width="7" height="5" fill="#f5c842"/>
    <rect x="3"  y="4"  width="7" height="1" fill="#ffd84d"/>
    <rect x="3"  y="8"  width="7" height="1" fill="#c8941d"/>

    <!-- wing (mid-flap, raised) -->
    <rect x="3"  y="2"  width="3" height="2" fill="#1a0f08"/>
    <rect x="4"  y="2"  width="2" height="1" fill="#fef6e4"/>
    <rect x="4"  y="3"  width="2" height="1" fill="#e8c089"/>

    <!-- eye -->
    <rect x="8"  y="5"  width="1" height="2" fill="#fef6e4"/>
    <rect x="9"  y="5"  width="1" height="1" fill="#1a0f08"/>

    <!-- beak (open, calling out) -->
    <rect x="11" y="5"  width="2" height="1" fill="#1a0f08"/>
    <rect x="11" y="6"  width="3" height="1" fill="#e05a3c"/>
    <rect x="11" y="7"  width="2" height="1" fill="#1a0f08"/>
    <rect x="13" y="6"  width="1" height="1" fill="#8b3a3a"/>

    <!-- COWBOY HAT on top of bird (the western flavor) -->
    <rect x="2"  y="0"  width="8" height="1" fill="#1a0f08"/>
    <rect x="3"  y="1"  width="6" height="1" fill="#6b3f24"/>
    <rect x="4"  y="-1" width="4" height="2" fill="#1a0f08"/>
    <rect x="5"  y="0"  width="2" height="1" fill="#a87545"/>

    <!-- legs/feet (tucked) -->
    <rect x="5"  y="9"  width="1" height="2" fill="#c8941d"/>
    <rect x="7"  y="9"  width="1" height="2" fill="#c8941d"/>
  </g>

  <!-- flap motion -->
  <g fill="#fef6e4" opacity="0.6">
    <rect x="6"  y="20" width="3" height="1"/>
    <rect x="3"  y="22" width="3" height="1"/>
  </g>
</svg>
