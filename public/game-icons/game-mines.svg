<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — GAME ICON: MINES -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- ground shadow -->
  <ellipse cx="24" cy="44" rx="20" ry="2" fill="#1a0f08" opacity="0.3"/>

  <!-- ===== 3x3 GRID ===== -->
  <!-- frame outer -->
  <rect x="3"  y="6"  width="42" height="34" fill="#1a0f08"/>
  <rect x="4"  y="7"  width="40" height="32" fill="#3d2418"/>

  <!-- grid cells (10x10 each, with 1px gaps) -->
  <!-- row 1 -->
  <g transform="translate(5 8)">
    <!-- cell 0,0: covered (safe) -->
    <rect x="0"  y="0"  width="11" height="9" fill="#1a0f08"/>
    <rect x="1"  y="1"  width="9"  height="7" fill="#a87545"/>
    <rect x="1"  y="1"  width="9"  height="1" fill="#d4a574"/>
    <rect x="1"  y="7"  width="9"  height="1" fill="#6b3f24"/>
    <rect x="1"  y="1"  width="1"  height="6" fill="#d4a574"/>
    <rect x="9"  y="2"  width="1"  height="5" fill="#6b3f24"/>

    <!-- cell 1,0: covered with question mark hint -->
    <rect x="13" y="0"  width="11" height="9" fill="#1a0f08"/>
    <rect x="14" y="1"  width="9"  height="7" fill="#a87545"/>
    <rect x="14" y="1"  width="9"  height="1" fill="#d4a574"/>
    <rect x="14" y="7"  width="9"  height="1" fill="#6b3f24"/>
    <rect x="14" y="1"  width="1"  height="6" fill="#d4a574"/>
    <rect x="22" y="2"  width="1"  height="5" fill="#6b3f24"/>
    <!-- $ hint -->
    <g fill="#7a5510">
      <rect x="17" y="3" width="3" height="1"/>
      <rect x="18" y="3" width="1" height="3"/>
    </g>

    <!-- cell 2,0: REVEALED — gold (safe pick reward) -->
    <rect x="26" y="0"  width="11" height="9" fill="#1a0f08"/>
    <rect x="27" y="1"  width="9"  height="7" fill="#fef6e4"/>
    <ellipse cx="31.5" cy="4.5" rx="3" ry="2.5" fill="#1a0f08"/>
    <ellipse cx="31.5" cy="4"   rx="3" ry="2.5" fill="#f5c842"/>
    <ellipse cx="30"   cy="3"   rx="1" ry="0.5" fill="#ffe9a8"/>
  </g>

  <!-- row 2 -->
  <g transform="translate(5 19)">
    <!-- cell 0,1: covered -->
    <rect x="0"  y="0"  width="11" height="9" fill="#1a0f08"/>
    <rect x="1"  y="1"  width="9"  height="7" fill="#a87545"/>
    <rect x="1"  y="1"  width="9"  height="1" fill="#d4a574"/>
    <rect x="1"  y="7"  width="9"  height="1" fill="#6b3f24"/>
    <rect x="1"  y="1"  width="1"  height="6" fill="#d4a574"/>
    <rect x="9"  y="2"  width="1"  height="5" fill="#6b3f24"/>

    <!-- cell 1,1: REVEALED — BOMB (the moment of truth) -->
    <rect x="13" y="0"  width="11" height="9" fill="#1a0f08"/>
    <rect x="14" y="1"  width="9"  height="7" fill="#e05a3c"/>
    <rect x="14" y="1"  width="9"  height="1" fill="#ff5544"/>
    <rect x="14" y="7"  width="9"  height="1" fill="#8b3a3a"/>
    <!-- bomb body (round black) -->
    <ellipse cx="18.5" cy="5"  rx="3" ry="3" fill="#1a0f08"/>
    <ellipse cx="17.5" cy="4"  rx="1" ry="0.8" fill="#3d2418"/>
    <!-- bomb fuse -->
    <rect x="20" y="2" width="1" height="2" fill="#7a5510"/>
    <rect x="21" y="1" width="1" height="2" fill="#7a5510"/>
    <!-- spark on fuse -->
    <rect x="21" y="0" width="1" height="1" fill="#ffd84d"/>
    <rect x="22" y="0" width="1" height="1" fill="#ffe9a8"/>
    <rect x="20" y="0" width="1" height="1" fill="#ffd84d"/>

    <!-- cell 2,1: covered -->
    <rect x="26" y="0"  width="11" height="9" fill="#1a0f08"/>
    <rect x="27" y="1"  width="9"  height="7" fill="#a87545"/>
    <rect x="27" y="1"  width="9"  height="1" fill="#d4a574"/>
    <rect x="27" y="7"  width="9"  height="1" fill="#6b3f24"/>
    <rect x="27" y="1"  width="1"  height="6" fill="#d4a574"/>
    <rect x="35" y="2"  width="1"  height="5" fill="#6b3f24"/>
  </g>

  <!-- row 3 -->
  <g transform="translate(5 30)">
    <!-- cell 0,2: covered -->
    <rect x="0"  y="0"  width="11" height="9" fill="#1a0f08"/>
    <rect x="1"  y="1"  width="9"  height="7" fill="#a87545"/>
    <rect x="1"  y="1"  width="9"  height="1" fill="#d4a574"/>
    <rect x="1"  y="7"  width="9"  height="1" fill="#6b3f24"/>
    <rect x="1"  y="1"  width="1"  height="6" fill="#d4a574"/>
    <rect x="9"  y="2"  width="1"  height="5" fill="#6b3f24"/>

    <!-- cell 1,2: covered -->
    <rect x="13" y="0"  width="11" height="9" fill="#1a0f08"/>
    <rect x="14" y="1"  width="9"  height="7" fill="#a87545"/>
    <rect x="14" y="1"  width="9"  height="1" fill="#d4a574"/>
    <rect x="14" y="7"  width="9"  height="1" fill="#6b3f24"/>
    <rect x="14" y="1"  width="1"  height="6" fill="#d4a574"/>
    <rect x="22" y="2"  width="1"  height="5" fill="#6b3f24"/>

    <!-- cell 2,2: covered -->
    <rect x="26" y="0"  width="11" height="9" fill="#1a0f08"/>
    <rect x="27" y="1"  width="9"  height="7" fill="#a87545"/>
    <rect x="27" y="1"  width="9"  height="1" fill="#d4a574"/>
    <rect x="27" y="7"  width="9"  height="1" fill="#6b3f24"/>
    <rect x="27" y="1"  width="1"  height="6" fill="#d4a574"/>
    <rect x="35" y="2"  width="1"  height="5" fill="#6b3f24"/>
  </g>

  <!-- explosion radiating from bomb cell -->
  <g fill="#ffd84d" opacity="0.5">
    <rect x="22" y="22" width="2" height="1"/>
    <rect x="32" y="20" width="2" height="1"/>
    <rect x="20" y="30" width="2" height="1"/>
  </g>
</svg>
