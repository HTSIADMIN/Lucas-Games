<?xml version="1.0" encoding="UTF-8"?>
<!--
  Coin Flip — Lobby Hero Image (1920x1080 HD)
  Cinematic render: hero coin mid-flip with motion trail, on a saloon felt table,
  dramatic warm spotlight, atmospheric particles, stacked chips.
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
