<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — GAME ICON: COIN FLIP -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- ground shadow (small, far below — coin is in air) -->
  <ellipse cx="24" cy="44" rx="10" ry="1.5" fill="#1a0f08" opacity="0.3"/>

  <!-- ===== MOTION LINES (left side) ===== -->
  <g fill="#c8941d" opacity="0.7">
    <rect x="2"  y="14" width="6" height="1"/>
    <rect x="3"  y="20" width="5" height="1"/>
    <rect x="2"  y="26" width="6" height="1"/>
    <rect x="4"  y="32" width="4" height="1"/>
  </g>
  <g fill="#ffd84d" opacity="0.5">
    <rect x="0"  y="14" width="2" height="1"/>
    <rect x="0"  y="20" width="3" height="1"/>
    <rect x="0"  y="26" width="2" height="1"/>
  </g>

  <!-- ===== MOTION LINES (right side) ===== -->
  <g fill="#c8941d" opacity="0.7">
    <rect x="40" y="14" width="6" height="1"/>
    <rect x="40" y="20" width="5" height="1"/>
    <rect x="40" y="26" width="6" height="1"/>
    <rect x="40" y="32" width="4" height="1"/>
  </g>
  <g fill="#ffd84d" opacity="0.5">
    <rect x="46" y="14" width="2" height="1"/>
    <rect x="45" y="20" width="3" height="1"/>
    <rect x="46" y="26" width="2" height="1"/>
  </g>

  <!-- ===== COIN (slightly tilted ellipse — implies spin) ===== -->
  <!-- coin edge / depth -->
  <ellipse cx="24" cy="26" rx="14" ry="14" fill="#1a0f08"/>
  <ellipse cx="24" cy="22" rx="14" ry="14" fill="#7a5510"/>
  <ellipse cx="24" cy="22" rx="14" ry="14" fill="none" stroke="#1a0f08" stroke-width="1"/>

  <!-- coin face (gold) -->
  <ellipse cx="24" cy="20" rx="14" ry="14" fill="#1a0f08"/>
  <ellipse cx="24" cy="20" rx="13" ry="13" fill="#f5c842"/>

  <!-- coin highlight (top arc) -->
  <ellipse cx="22" cy="16" rx="9" ry="5" fill="#ffd84d"/>
  <ellipse cx="20" cy="13" rx="5" ry="2" fill="#ffe9a8"/>

  <!-- coin shadow (bottom arc) -->
  <path d="M 11 22 Q 24 35 37 22 Q 24 30 11 22 Z" fill="#c8941d"/>

  <!-- inner ring -->
  <circle cx="24" cy="20" r="10" fill="none" stroke="#c8941d" stroke-width="1"/>
  <!-- ring dots -->
  <g fill="#7a5510">
    <rect x="14" y="20" width="1" height="1"/>
    <rect x="33" y="20" width="1" height="1"/>
    <rect x="24" y="10" width="1" height="1"/>
    <rect x="24" y="30" width="1" height="1"/>
    <rect x="17" y="13" width="1" height="1"/>
    <rect x="31" y="13" width="1" height="1"/>
    <rect x="17" y="27" width="1" height="1"/>
    <rect x="31" y="27" width="1" height="1"/>
  </g>

  <!-- ===== "$" STAMP CENTER ===== -->
  <g fill="#7a5510">
    <!-- vertical stem -->
    <rect x="23" y="14" width="2" height="13"/>
    <!-- top curl of S -->
    <rect x="20" y="16" width="6" height="1"/>
    <rect x="19" y="16" width="1" height="2"/>
    <rect x="20" y="17" width="2" height="1"/>
    <!-- middle of S -->
    <rect x="20" y="19" width="6" height="2"/>
    <rect x="26" y="20" width="2" height="2"/>
    <!-- bottom curl of S -->
    <rect x="20" y="22" width="6" height="1"/>
    <rect x="28" y="20" width="1" height="3"/>
    <rect x="22" y="23" width="6" height="1"/>
    <rect x="19" y="22" width="1" height="2"/>
  </g>
</svg>
