    <radialGradient id="bg-spot" cx="30%" cy="20%" r="80%">
      <stop offset="0%"  stop-color="#7a3818" stop-opacity="1"/>
      <stop offset="20%" stop-color="#4a1c10" stop-opacity="1"/>
      <stop offset="60%" stop-color="#1a0a08" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0404" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="felt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#3d6b2e"/>
      <stop offset="50%" stop-color="#1f3818"/>
      <stop offset="100%" stop-color="#0a1808"/>
    </linearGradient>
    <radialGradient id="felt-spot" cx="35%" cy="40%" r="55%">
      <stop offset="0%"  stop-color="#5a8a3e" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#3d6b2e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1f3818" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wood-edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#7a3818"/>
      <stop offset="50%" stop-color="#4a2818"/>
      <stop offset="100%" stop-color="#2a1810"/>
    </linearGradient>
    <radialGradient id="coin-face" cx="30%" cy="22%" r="75%">
      <stop offset="0%"  stop-color="#fff9e0"/>
      <stop offset="15%" stop-color="#ffe9a8"/>
      <stop offset="40%" stop-color="#f5c842"/>
      <stop offset="70%" stop-color="#c8941d"/>
      <stop offset="95%" stop-color="#7a5510"/>
      <stop offset="100%" stop-color="#3a2810"/>
    </radialGradient>
    <radialGradient id="coin-rim" cx="30%" cy="22%" r="70%">
      <stop offset="0%"  stop-color="#ffe9a8"/>
      <stop offset="40%" stop-color="#c8941d"/>
      <stop offset="80%" stop-color="#5a3810"/>
      <stop offset="100%" stop-color="#2a1810"/>
    </radialGradient>
    <linearGradient id="coin-edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffe9a8"/>
      <stop offset="20%" stop-color="#c8941d"/>
      <stop offset="50%" stop-color="#7a5510"/>
      <stop offset="80%" stop-color="#3a2810"/>
      <stop offset="100%" stop-color="#1a0f08"/>
    </linearGradient>
    <radialGradient id="coin-gloss" cx="32%" cy="18%" r="35%">
      <stop offset="0%"  stop-color="white" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trail-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#f5c842" stop-opacity="0"/>
      <stop offset="40%" stop-color="#f5c842" stop-opacity="0.25"/>
      <stop offset="85%" stop-color="#ffe9a8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff9e0" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffd84d" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#c8941d" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c8941d" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bokeh-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="coin-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="20" dy="40"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.7"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="spark-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="engrave" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1"/>
      <feOffset dx="1" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
