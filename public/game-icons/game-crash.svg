<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — GAME ICON: CRASH -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- ===== NIGHT SKY BACKGROUND ===== -->
  <rect x="2" y="2" width="44" height="44" fill="#143348"/>
  <rect x="2" y="2" width="44" height="2"  fill="#2c6a8e"/>
  <rect x="2" y="44" width="44" height="2" fill="#1a0f08"/>
  <rect x="2" y="2" width="2" height="44" fill="#2c6a8e"/>
  <rect x="44" y="2" width="2" height="44" fill="#1a0f08"/>

  <!-- stars in sky -->
  <g fill="#fef6e4">
    <rect x="6"  y="8"  width="1" height="1"/>
    <rect x="14" y="5"  width="1" height="1"/>
    <rect x="38" y="6"  width="1" height="1"/>
    <rect x="42" y="14" width="1" height="1"/>
    <rect x="6"  y="20" width="1" height="1"/>
    <rect x="20" y="32" width="1" height="1"/>
  </g>

  <!-- ===== TRAJECTORY ARC (dashed line showing path) ===== -->
  <g fill="#f5c842">
    <rect x="6"  y="38" width="2" height="1"/>
    <rect x="9"  y="36" width="2" height="1"/>
    <rect x="12" y="33" width="2" height="1"/>
    <rect x="15" y="29" width="2" height="1"/>
    <rect x="18" y="25" width="2" height="1"/>
    <rect x="21" y="20" width="2" height="1"/>
    <rect x="24" y="16" width="2" height="1"/>
    <rect x="27" y="12" width="2" height="1"/>
  </g>
  <!-- arc highlight -->
  <g fill="#ffe9a8" opacity="0.6">
    <rect x="6"  y="37" width="2" height="1"/>
    <rect x="12" y="32" width="2" height="1"/>
    <rect x="18" y="24" width="2" height="1"/>
    <rect x="24" y="15" width="2" height="1"/>
  </g>

  <!-- ===== SMOKE/FIRE TRAIL behind rocket ===== -->
  <g fill="#e05a3c">
    <rect x="22" y="20" width="3" height="2"/>
    <rect x="20" y="22" width="3" height="2"/>
    <rect x="18" y="24" width="2" height="2"/>
    <rect x="16" y="26" width="2" height="2"/>
  </g>
  <g fill="#ffd84d">
    <rect x="23" y="20" width="2" height="2"/>
    <rect x="21" y="22" width="2" height="1"/>
    <rect x="19" y="24" width="1" height="1"/>
  </g>
  <g fill="#fef6e4" opacity="0.7">
    <rect x="14" y="28" width="2" height="2"/>
    <rect x="11" y="32" width="2" height="2"/>
    <rect x="8"  y="36" width="2" height="1"/>
  </g>

  <!-- ===== ROCKET (mid-flight, pointing up-right) ===== -->
  <g transform="translate(28 8) rotate(45 6 6)">
    <!-- exhaust -->
    <g fill="#ffd84d">
      <rect x="4" y="11" width="4" height="2"/>
      <rect x="5" y="13" width="2" height="2"/>
    </g>
    <g fill="#e05a3c">
      <rect x="3" y="13" width="6" height="1"/>
      <rect x="5" y="14" width="2" height="2"/>
    </g>
    <!-- fins -->
    <polygon points="2,8 4,11 4,8" fill="#1a0f08"/>
    <polygon points="10,8 8,11 8,8" fill="#1a0f08"/>
    <!-- body -->
    <rect x="4" y="3"  width="4" height="8" fill="#1a0f08"/>
    <rect x="5" y="4"  width="3" height="7" fill="#fef6e4"/>
    <rect x="5" y="4"  width="3" height="2" fill="#e05a3c"/>
    <rect x="5" y="6"  width="3" height="1" fill="#1a0f08"/>
    <!-- window/porthole -->
    <rect x="6" y="7"  width="1" height="1" fill="#5fa8d3"/>
    <!-- nose cone -->
    <polygon points="4,3 8,3 6,0" fill="#1a0f08"/>
    <polygon points="5,3 7,3 6,1" fill="#e05a3c"/>
  </g>

  <!-- ===== MULTIPLIER READOUT (big bold text) ===== -->
  <g>
    <!-- "2.4×" — chunky pixel digits with ink shadow -->
    <!-- shadow -->
    <g fill="#1a0f08">
      <!-- 2 -->
      <rect x="6"  y="14" width="6" height="1"/>
      <rect x="11" y="15" width="2" height="2"/>
      <rect x="9"  y="16" width="3" height="1"/>
      <rect x="6"  y="17" width="3" height="2"/>
      <rect x="6"  y="19" width="7" height="1"/>
      <!-- . -->
      <rect x="14" y="18" width="2" height="2"/>
      <!-- 4 -->
      <rect x="17" y="13" width="2" height="3"/>
      <rect x="22" y="13" width="2" height="6"/>
      <rect x="17" y="16" width="7" height="1"/>
      <rect x="22" y="19" width="2" height="1"/>
    </g>
    <!-- bright fill -->
    <g fill="#ffd84d">
      <rect x="6"  y="13" width="6" height="1"/>
      <rect x="11" y="14" width="2" height="2"/>
      <rect x="9"  y="15" width="3" height="1"/>
      <rect x="6"  y="16" width="3" height="2"/>
      <rect x="6"  y="18" width="7" height="1"/>
      <rect x="14" y="17" width="2" height="2"/>
      <rect x="17" y="12" width="2" height="3"/>
      <rect x="22" y="12" width="2" height="6"/>
      <rect x="17" y="15" width="7" height="1"/>
    </g>
  </g>

  <!-- "×" symbol after digits -->
  <g fill="#ffd84d">
    <rect x="26" y="14" width="1" height="1"/>
    <rect x="29" y="14" width="1" height="1"/>
    <rect x="27" y="15" width="2" height="1"/>
    <rect x="27" y="16" width="2" height="1"/>
    <rect x="26" y="17" width="1" height="1"/>
    <rect x="29" y="17" width="1" height="1"/>
  </g>
</svg>
