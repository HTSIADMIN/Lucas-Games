<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lucas Games — OUTLAW'S LAST STAND scratcher card background.
  Crimson sunset. Lone outlaw on a mesa, vultures, dead tree, dark jagged peaks.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 600"
     preserveAspectRatio="xMidYMid slice" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="ol-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#4a1a1a"/>
      <stop offset="35%" stop-color="#8b3a3a"/>
      <stop offset="65%" stop-color="#e05a3c"/>
      <stop offset="90%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#7a5510"/>
    </linearGradient>
    <linearGradient id="ol-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6b3f24"/>
      <stop offset="100%" stop-color="#2a1810"/>
    </linearGradient>
  </defs>

  <!-- ===== SKY ===== -->
  <rect width="480" height="430" fill="url(#ol-sky)"/>

  <!-- ===== SETTING SUN — half-circle on horizon, blood red ===== -->
  <g transform="translate(240 410)">
    <!-- glow halo -->
    <ellipse cx="0" cy="0" rx="120" ry="35" fill="#ffd84d" opacity="0.35"/>
    <ellipse cx="0" cy="0" rx="80"  ry="20" fill="#ffd84d" opacity="0.5"/>
    <!-- sun body — partial pixel circle, only top half visible -->
    <g fill="#e05a3c">
      <rect x="-22" y="-46" width="44" height="6"/>
      <rect x="-32" y="-40" width="64" height="6"/>
      <rect x="-40" y="-34" width="80" height="6"/>
      <rect x="-46" y="-28" width="92" height="6"/>
      <rect x="-50" y="-22" width="100" height="6"/>
      <rect x="-52" y="-16" width="104" height="6"/>
      <rect x="-54" y="-10" width="108" height="6"/>
      <rect x="-54" y="-4"  width="108" height="6"/>
    </g>
    <!-- Cloud streak across sun -->
    <rect x="-60" y="-14" width="120" height="3" fill="#4a1a1a" opacity="0.7"/>
    <rect x="-50" y="-26" width="100" height="2" fill="#4a1a1a" opacity="0.5"/>
  </g>

  <!-- ===== CLOUD BANKS — dark dramatic streaks ===== -->
  <g fill="#2a1810" opacity="0.55">
    <rect x="0"   y="60"  width="220" height="6"/>
    <rect x="40"  y="66"  width="160" height="3"/>
    <rect x="280" y="100" width="200" height="6"/>
    <rect x="300" y="106" width="160" height="3"/>
    <rect x="20"  y="160" width="120" height="4"/>
    <rect x="380" y="180" width="100" height="4"/>
    <rect x="60"  y="240" width="160" height="3" opacity="0.7"/>
    <rect x="320" y="280" width="100" height="3" opacity="0.7"/>
  </g>

  <!-- ===== VULTURES CIRCLING ===== -->
  <g fill="#1a0f08">
    <!-- Vulture 1 — top -->
    <g transform="translate(120 110)">
      <rect x="-6" y="0" width="3" height="2"/>
      <rect x="-3" y="-1" width="2" height="2"/>
      <rect x="-1" y="0" width="3" height="2"/>
      <rect x="2"  y="-1" width="2" height="2"/>
      <rect x="4"  y="0" width="3" height="2"/>
      <rect x="0"  y="2" width="1" height="2"/>
    </g>
    <!-- Vulture 2 — mid -->
    <g transform="translate(360 220)">
      <rect x="-7" y="0" width="4" height="2"/>
      <rect x="-3" y="-1" width="2" height="2"/>
      <rect x="-1" y="0" width="3" height="2"/>
      <rect x="2"  y="-1" width="2" height="2"/>
      <rect x="4"  y="0" width="4" height="2"/>
    </g>
    <!-- Vulture 3 — small, far -->
    <g transform="translate(220 60)">
      <rect x="-3" y="0" width="2" height="1"/>
      <rect x="-1" y="-1" width="1" height="1"/>
      <rect x="0"  y="0" width="1" height="1"/>
      <rect x="1"  y="-1" width="1" height="1"/>
      <rect x="2"  y="0" width="2" height="1"/>
    </g>
  </g>

  <!-- ===== FAR JAGGED MOUNTAINS — silhouette ===== -->
  <g fill="#2a1810">
    <polygon points="0,420 30,380 50,360 80,340 110,360 140,330 170,350 200,310 230,340 260,320 290,355 320,330 350,360 380,340 410,365 440,345 480,375 480,420"/>
  </g>

  <!-- ===== MID MOUNTAINS — slightly lighter ===== -->
  <g fill="#1a0f08" opacity="0.85">
    <polygon points="0,430 0,400 30,395 50,405 80,395 110,410 130,400 160,415 190,405 220,420 250,410 280,425 310,415 340,425 370,420 400,430 430,425 460,430 480,430"/>
  </g>

  <!-- ===== HERO MESA WITH OUTLAW SILHOUETTE — center-left, prominent ===== -->
  <g transform="translate(160 360)">
    <!-- Mesa base -->
    <g fill="#1a0f08">
      <polygon points="0,80 0,40 8,40 8,30 12,30 12,20 70,20 70,30 74,30 74,40 82,40 82,80"/>
      <!-- Mesa stripe details -->
      <g fill="#2a1810">
        <rect x="0"  y="55" width="82" height="2"/>
        <rect x="0"  y="65" width="82" height="2"/>
      </g>
    </g>
    <!-- Outlaw silhouette on top of mesa -->
    <g fill="#1a0f08" transform="translate(36 0)">
      <!-- Hat brim -->
      <rect x="-5" y="2" width="14" height="2"/>
      <!-- Hat crown -->
      <rect x="-1" y="-2" width="6" height="4"/>
      <rect x="0"  y="-3" width="4" height="1"/>
      <!-- Head -->
      <rect x="0"  y="4"  width="4" height="3"/>
      <!-- Body / coat -->
      <rect x="-2" y="7"  width="8" height="8"/>
      <!-- Coat tails flaring -->
      <rect x="-3" y="13" width="2" height="3"/>
      <rect x="6"  y="13" width="2" height="3"/>
      <!-- Legs -->
      <rect x="-1" y="15" width="2" height="5"/>
      <rect x="3"  y="15" width="2" height="5"/>
      <!-- Pistol drawn (right hand) -->
      <rect x="6"  y="9" width="4" height="2"/>
    </g>
  </g>

  <!-- ===== GROUND ===== -->
  <rect x="0" y="430" width="480" height="170" fill="url(#ol-ground)"/>

  <!-- Cracked earth lines -->
  <g fill="#1a0f08" opacity="0.4">
    <rect x="0"   y="460" width="160" height="2"/>
    <rect x="220" y="475" width="180" height="2"/>
    <rect x="40"  y="500" width="280" height="2"/>
    <rect x="180" y="530" width="240" height="2"/>
    <rect x="0"   y="555" width="200" height="2"/>
    <rect x="320" y="565" width="160" height="2"/>
    <!-- diagonal cracks -->
    <rect x="80"  y="478" width="3"  height="20"/>
    <rect x="78"  y="498" width="6"  height="2"/>
    <rect x="280" y="510" width="3"  height="20"/>
    <rect x="278" y="530" width="6"  height="2"/>
  </g>

  <!-- ===== DEAD TREE — bottom right ===== -->
  <g fill="#1a0f08" transform="translate(380 430)">
    <!-- trunk -->
    <rect x="0"  y="0"  width="4" height="80"/>
    <rect x="4"  y="20" width="2" height="60"/>
    <!-- branches -->
    <rect x="-12" y="10" width="12" height="2"/>
    <rect x="-12" y="10" width="2"  height="-8"/>
    <rect x="-14" y="0"  width="2"  height="-6"/>
    <rect x="-22" y="-4" width="8"  height="2"/>
    <!-- right branch -->
    <rect x="6"   y="20" width="14" height="2"/>
    <rect x="18"  y="14" width="2"  height="8"/>
    <rect x="20"  y="14" width="6"  height="2"/>
    <rect x="24"  y="8"  width="2"  height="8"/>
    <!-- top branches -->
    <rect x="-4"  y="-12" width="8" height="2"/>
    <rect x="-4"  y="-18" width="2" height="6"/>
    <rect x="0"   y="-22" width="2" height="6"/>
    <rect x="4"   y="-12" width="2" height="-8"/>
    <rect x="6"   y="-22" width="4" height="2"/>
  </g>

  <!-- ===== TUMBLEWEED — lower mid ===== -->
  <g transform="translate(80 540)">
    <g fill="#6b3f24">
      <rect x="-8"  y="-2" width="3" height="2"/>
      <rect x="-5"  y="-5" width="3" height="3"/>
      <rect x="-2"  y="-7" width="4" height="2"/>
      <rect x="2"   y="-5" width="3" height="3"/>
      <rect x="5"   y="-2" width="3" height="2"/>
      <rect x="-6"  y="0"  width="2" height="2"/>
      <rect x="-3"  y="2"  width="3" height="2"/>
      <rect x="0"   y="2"  width="3" height="2"/>
      <rect x="3"   y="0"  width="3" height="2"/>
      <!-- inner sticks -->
      <rect x="-3"  y="-3" width="6" height="1"/>
      <rect x="-3"  y="0"  width="6" height="1"/>
      <rect x="-1"  y="-5" width="1" height="6"/>
    </g>
    <ellipse cx="0" cy="6" rx="9" ry="2" fill="#1a0f08" opacity="0.5"/>
  </g>

  <!-- ===== GRAVE MARKER — left side, far back ===== -->
  <g fill="#4a2818" transform="translate(50 470)">
    <rect x="0"   y="0"   width="3" height="20"/>
    <rect x="-4"  y="4"   width="11" height="3"/>
  </g>
  <ellipse cx="51" cy="491" rx="10" ry="2" fill="#1a0f08" opacity="0.6"/>

  <!-- ===== FOREGROUND BOOTPRINTS / SHELL CASINGS HINT ===== -->
  <g fill="#c8941d" opacity="0.85">
    <!-- shell casing 1 -->
    <rect x="200" y="585" width="3" height="6"/>
    <rect x="199" y="585" width="5" height="2"/>
    <!-- shell casing 2 -->
    <rect x="240" y="578" width="3" height="6"/>
    <rect x="239" y="578" width="5" height="2"/>
    <!-- shell casing 3 -->
    <rect x="270" y="592" width="3" height="6"/>
    <rect x="269" y="592" width="5" height="2"/>
  </g>

  <!-- ===== ATMOSPHERIC HAZE near horizon ===== -->
  <rect x="0" y="395" width="480" height="35" fill="#e05a3c" opacity="0.18"/>
</svg>
