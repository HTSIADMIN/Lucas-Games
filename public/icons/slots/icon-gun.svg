<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lucas Games — SLOT ICON: GUN  (low-mid)  3oak 1× · 4oak 5× · 5oak 14×
  Six-shooter revolver, side view, barrel pointing right.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- ground shadow -->
  <ellipse cx="16" cy="27" rx="11" ry="1.2" fill="#1a0f08" opacity="0.25"/>

  <!-- ===== BARREL (right-pointing) ===== -->
  <!-- outline -->
  <rect x="14" y="11" width="15" height="1" fill="#1a0f08"/>
  <rect x="14" y="15" width="15" height="1" fill="#1a0f08"/>
  <rect x="29" y="11" width="1"  height="5" fill="#1a0f08"/>
  <!-- barrel body -->
  <rect x="14" y="12" width="15" height="3" fill="#3d2418"/>
  <!-- barrel highlight (top) -->
  <rect x="14" y="12" width="15" height="1" fill="#6b3f24"/>
  <!-- muzzle -->
  <rect x="28" y="12" width="1" height="3" fill="#1a0f08"/>
  <rect x="27" y="13" width="1" height="1" fill="#0a0604"/>

  <!-- front sight blade -->
  <rect x="25" y="10" width="1" height="1" fill="#1a0f08"/>

  <!-- ===== CYLINDER (round chamber) ===== -->
  <!-- outline -->
  <rect x="9"  y="9"  width="6" height="1" fill="#1a0f08"/>
  <rect x="9"  y="17" width="6" height="1" fill="#1a0f08"/>
  <rect x="8"  y="10" width="1" height="7" fill="#1a0f08"/>
  <rect x="15" y="10" width="1" height="7" fill="#1a0f08"/>
  <!-- cylinder body -->
  <rect x="9"  y="10" width="6" height="7" fill="#3d2418"/>
  <!-- cylinder gold trim ring -->
  <rect x="9"  y="10" width="6" height="1" fill="#c8941d"/>
  <rect x="9"  y="16" width="6" height="1" fill="#c8941d"/>
  <!-- chamber holes (visible bullets) -->
  <g fill="#1a0f08">
    <rect x="10" y="12" width="1" height="1"/>
    <rect x="13" y="12" width="1" height="1"/>
    <rect x="11" y="14" width="1" height="1"/>
    <rect x="12" y="14" width="1" height="1"/>
  </g>
  <!-- bullet glints -->
  <g fill="#f5c842">
    <rect x="10" y="13" width="1" height="1" opacity="0.6"/>
    <rect x="13" y="13" width="1" height="1" opacity="0.6"/>
  </g>

  <!-- ===== HAMMER (top-back) ===== -->
  <rect x="9"  y="7"  width="2" height="2" fill="#1a0f08"/>
  <rect x="10" y="6"  width="1" height="1" fill="#1a0f08"/>

  <!-- ===== TRIGGER GUARD (loop under cylinder) ===== -->
  <rect x="10" y="18" width="5" height="1" fill="#1a0f08"/>
  <rect x="10" y="19" width="1" height="2" fill="#1a0f08"/>
  <rect x="14" y="19" width="1" height="2" fill="#1a0f08"/>
  <rect x="10" y="21" width="5" height="1" fill="#1a0f08"/>
  <!-- trigger -->
  <rect x="12" y="19" width="1" height="2" fill="#3d2418"/>

  <!-- ===== GRIP (wood, angled back-down) ===== -->
  <!-- outline -->
  <rect x="3" y="17" width="6" height="1" fill="#1a0f08"/>
  <rect x="2" y="18" width="1" height="2" fill="#1a0f08"/>
  <rect x="1" y="20" width="1" height="3" fill="#1a0f08"/>
  <rect x="2" y="23" width="6" height="1" fill="#1a0f08"/>
  <rect x="8" y="22" width="1" height="1" fill="#1a0f08"/>
  <rect x="9" y="20" width="1" height="2" fill="#1a0f08"/>
  <!-- grip body (wood) -->
  <rect x="3" y="18" width="6" height="2" fill="#a87545"/>
  <rect x="2" y="20" width="7" height="3" fill="#a87545"/>
  <!-- grip wood grain -->
  <g fill="#6b3f24">
    <rect x="3" y="18" width="6" height="1"/>
    <rect x="2" y="22" width="7" height="1"/>
    <rect x="3" y="20" width="1" height="1"/>
    <rect x="6" y="21" width="1" height="1"/>
  </g>
  <!-- grip highlight stripe -->
  <rect x="3" y="19" width="5" height="1" fill="#d4a574"/>
  <!-- grip rivet -->
  <rect x="5" y="20" width="1" height="1" fill="#c8941d"/>
</svg>
