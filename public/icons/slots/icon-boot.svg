<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lucas Games — SLOT ICON: BOOT  (low tier)  3oak 1× · 4oak 3× · 5oak 8×
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- ground shadow -->
  <ellipse cx="16" cy="29" rx="12" ry="1.5" fill="#1a0f08" opacity="0.28"/>

  <!-- pull strap -->
  <rect x="14" y="3" width="4" height="1" fill="#1a0f08"/>
  <rect x="14" y="4" width="1" height="2" fill="#1a0f08"/>
  <rect x="17" y="4" width="1" height="2" fill="#1a0f08"/>
  <rect x="15" y="4" width="2" height="2" fill="#6b3f24"/>

  <!-- shaft outline -->
  <rect x="10" y="5"  width="12" height="1"  fill="#1a0f08"/>
  <rect x="10" y="5"  width="1"  height="14" fill="#1a0f08"/>
  <rect x="21" y="5"  width="1"  height="14" fill="#1a0f08"/>
  <!-- shaft body -->
  <rect x="11" y="6"  width="10" height="13" fill="#a87545"/>
  <!-- shaft left shadow -->
  <rect x="11" y="6"  width="2"  height="13" fill="#6b3f24"/>
  <!-- shaft right highlight -->
  <rect x="20" y="6"  width="1"  height="13" fill="#d4a574"/>
  <!-- top dark band (opening interior) -->
  <rect x="11" y="6"  width="10" height="1"  fill="#3d2418"/>
  <!-- stitching -->
  <g fill="#7a5510">
    <rect x="14" y="9"  width="1" height="1"/>
    <rect x="16" y="9"  width="1" height="1"/>
    <rect x="18" y="9"  width="1" height="1"/>
    <rect x="14" y="13" width="1" height="1"/>
    <rect x="16" y="13" width="1" height="1"/>
    <rect x="18" y="13" width="1" height="1"/>
    <rect x="14" y="17" width="1" height="1"/>
    <rect x="16" y="17" width="1" height="1"/>
    <rect x="18" y="17" width="1" height="1"/>
  </g>

  <!-- foot top edge (outline) -->
  <rect x="10" y="19" width="18" height="1" fill="#1a0f08"/>
  <rect x="28" y="20" width="1"  height="1" fill="#1a0f08"/>
  <rect x="29" y="21" width="1"  height="3" fill="#1a0f08"/>

  <!-- foot body -->
  <rect x="11" y="20" width="17" height="4" fill="#a87545"/>
  <rect x="28" y="21" width="1"  height="3" fill="#a87545"/>
  <!-- foot top highlight -->
  <rect x="11" y="20" width="17" height="1" fill="#d4a574"/>
  <!-- foot bottom shadow -->
  <rect x="11" y="23" width="17" height="1" fill="#6b3f24"/>

  <!-- sole -->
  <rect x="9"  y="24" width="21" height="2" fill="#1a0f08"/>

  <!-- heel block (back) -->
  <rect x="9"  y="26" width="6"  height="3" fill="#1a0f08"/>

  <!-- SPUR — gold star wheel attached at back of heel -->
  <!-- attachment shank -->
  <rect x="6" y="27" width="3" height="1" fill="#c8941d"/>
  <!-- star wheel (5-point compact) -->
  <g fill="#f5c842">
    <rect x="3" y="26" width="2" height="4"/>
    <rect x="2" y="27" width="4" height="2"/>
    <rect x="1" y="27" width="1" height="2"/>
    <rect x="6" y="27" width="1" height="2"/>
  </g>
  <rect x="3" y="27" width="2" height="2" fill="#c8941d"/>
  <rect x="3" y="27" width="1" height="1" fill="#ffd84d"/>
</svg>
