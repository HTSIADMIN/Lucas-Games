<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lucas Games — SLOT ICON: SHERIFF  (top)  3oak 8× · 4oak 30× · 5oak 150×
  Character bust: hat, mustache, bandana, badge. The hero of the reels.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- ===== HAT (cowboy hat) ===== -->
  <!-- brim outline -->
  <rect x="2"  y="9"  width="28" height="1" fill="#1a0f08"/>
  <rect x="2"  y="11" width="28" height="1" fill="#1a0f08"/>
  <rect x="1"  y="10" width="1"  height="1" fill="#1a0f08"/>
  <rect x="30" y="10" width="1"  height="1" fill="#1a0f08"/>
  <!-- brim body -->
  <rect x="2"  y="10" width="28" height="1" fill="#6b3f24"/>
  <!-- crown outline -->
  <rect x="9"  y="3"  width="14" height="1" fill="#1a0f08"/>
  <rect x="8"  y="4"  width="1"  height="5" fill="#1a0f08"/>
  <rect x="23" y="4"  width="1"  height="5" fill="#1a0f08"/>
  <rect x="8"  y="9"  width="16" height="0" fill="#1a0f08"/>
  <!-- crown body -->
  <rect x="9"  y="4"  width="14" height="5" fill="#6b3f24"/>
  <!-- crown top crease -->
  <rect x="13" y="4"  width="6"  height="2" fill="#3d2418"/>
  <rect x="15" y="3"  width="2"  height="1" fill="#3d2418"/>
  <!-- crown highlight stripe -->
  <rect x="9"  y="6"  width="2"  height="3" fill="#a87545"/>
  <!-- hatband -->
  <rect x="8"  y="8"  width="16" height="1" fill="#1a0f08"/>
  <rect x="8"  y="9"  width="16" height="1" fill="#3d2418"/>
  <!-- hatband star -->
  <rect x="15" y="8"  width="2"  height="2" fill="#f5c842"/>
  <rect x="15" y="9"  width="1"  height="1" fill="#c8941d"/>

  <!-- ===== FACE ===== -->
  <!-- outline (head shape) -->
  <rect x="10" y="11" width="12" height="1" fill="#1a0f08"/>
  <rect x="9"  y="12" width="1"  height="6" fill="#1a0f08"/>
  <rect x="22" y="12" width="1"  height="6" fill="#1a0f08"/>
  <rect x="10" y="18" width="12" height="1" fill="#1a0f08"/>
  <!-- face fill -->
  <rect x="10" y="12" width="12" height="6" fill="#fbe9c4"/>
  <!-- jaw shadow -->
  <rect x="10" y="17" width="12" height="1" fill="#e8c089"/>
  <rect x="21" y="13" width="1"  height="4" fill="#e8c089"/>
  <!-- cheek hint -->
  <rect x="10" y="14" width="1"  height="2" fill="#e8c089"/>

  <!-- eyes (under hat brim shadow) -->
  <rect x="10" y="12" width="12" height="1" fill="#3d2418" opacity="0.5"/>
  <g fill="#1a0f08">
    <rect x="12" y="13" width="2" height="1"/>
    <rect x="18" y="13" width="2" height="1"/>
  </g>
  <!-- eye glints -->
  <g fill="#fef6e4">
    <rect x="13" y="13" width="1" height="1"/>
    <rect x="19" y="13" width="1" height="1"/>
  </g>

  <!-- nose -->
  <rect x="15" y="14" width="2" height="2" fill="#e8c089"/>
  <rect x="15" y="15" width="1" height="1" fill="#d4a574"/>

  <!-- ===== MUSTACHE (handlebar) ===== -->
  <g fill="#3d2418">
    <rect x="11" y="16" width="10" height="1"/>
    <rect x="10" y="16" width="1"  height="1"/>
    <rect x="21" y="16" width="1"  height="1"/>
    <rect x="11" y="17" width="3"  height="1"/>
    <rect x="18" y="17" width="3"  height="1"/>
    <!-- twirl tips -->
    <rect x="9"  y="17" width="2"  height="1"/>
    <rect x="21" y="17" width="2"  height="1"/>
    <rect x="9"  y="18" width="1"  height="0"/>
  </g>
  <rect x="14" y="16" width="4" height="1" fill="#1a0f08"/>

  <!-- ===== BANDANA / NECKERCHIEF ===== -->
  <!-- top knot -->
  <rect x="13" y="19" width="6"  height="1" fill="#1a0f08"/>
  <rect x="14" y="19" width="4"  height="1" fill="#e05a3c"/>
  <!-- bandana body outline -->
  <rect x="6"  y="20" width="20" height="1" fill="#1a0f08"/>
  <rect x="5"  y="21" width="1"  height="3" fill="#1a0f08"/>
  <rect x="26" y="21" width="1"  height="3" fill="#1a0f08"/>
  <rect x="6"  y="24" width="20" height="1" fill="#1a0f08"/>
  <!-- bandana fill -->
  <rect x="6"  y="20" width="20" height="4" fill="#e05a3c"/>
  <!-- bandana top shadow (under chin) -->
  <rect x="9"  y="20" width="14" height="1" fill="#8b3a3a"/>
  <!-- bandana pattern dots -->
  <g fill="#ffb8a8">
    <rect x="8"  y="22" width="1" height="1"/>
    <rect x="12" y="21" width="1" height="1"/>
    <rect x="16" y="22" width="1" height="1"/>
    <rect x="20" y="21" width="1" height="1"/>
    <rect x="23" y="22" width="1" height="1"/>
  </g>
  <!-- bandana fold/crease -->
  <rect x="6"  y="23" width="20" height="1" fill="#8b3a3a"/>

  <!-- ===== SHIRT / SHOULDERS ===== -->
  <rect x="2"  y="25" width="1"  height="6" fill="#1a0f08"/>
  <rect x="29" y="25" width="1"  height="6" fill="#1a0f08"/>
  <rect x="3"  y="24" width="2"  height="1" fill="#1a0f08"/>
  <rect x="27" y="24" width="2"  height="1" fill="#1a0f08"/>
  <rect x="3"  y="25" width="26" height="6" fill="#4a2818"/>
  <!-- vest opening -->
  <rect x="14" y="25" width="4"  height="6" fill="#3d2418"/>
  <rect x="14" y="25" width="1"  height="6" fill="#1a0f08"/>
  <rect x="17" y="25" width="1"  height="6" fill="#1a0f08"/>

  <!-- ===== BADGE on chest ===== -->
  <g transform="translate(7 26)">
    <!-- star outline -->
    <g fill="#1a0f08">
      <rect x="2" y="-1" width="1" height="1"/>
      <rect x="0" y="1"  width="5" height="1"/>
      <rect x="0" y="3"  width="5" height="1"/>
      <rect x="0" y="0"  width="1" height="3"/>
      <rect x="4" y="0"  width="1" height="3"/>
      <rect x="0" y="2"  width="1" height="2"/>
      <rect x="4" y="2"  width="1" height="2"/>
      <rect x="1" y="4"  width="1" height="1"/>
      <rect x="3" y="4"  width="1" height="1"/>
    </g>
    <!-- star fill -->
    <rect x="2" y="0"  width="1" height="1" fill="#f5c842"/>
    <rect x="1" y="1"  width="3" height="2" fill="#f5c842"/>
    <rect x="2" y="3"  width="1" height="1" fill="#f5c842"/>
    <rect x="1" y="2"  width="1" height="1" fill="#ffd84d"/>
  </g>
</svg>
