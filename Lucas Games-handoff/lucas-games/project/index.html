<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lucas Games — Pixel Saloon Design System</title>
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="components.css" />
<link rel="stylesheet" href="games.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  /* Hero specific */
  .hero-banner {
    background: var(--saddle-500);
    border: 4px solid var(--ink-900);
    padding: var(--sp-8) var(--sp-7);
    color: var(--parchment-50);
    box-shadow: var(--sh-table);
    position: relative;
    overflow: hidden;
    margin-bottom: var(--sp-8);
    background-image:
      repeating-linear-gradient(0deg,
        rgba(74,40,24,0.15) 0, rgba(74,40,24,0.15) 2px,
        transparent 2px, transparent 8px),
      repeating-linear-gradient(0deg,
        rgba(255,233,168,0.06) 0, rgba(255,233,168,0.06) 1px,
        transparent 1px, transparent 16px);
  }
  .hero-banner::before {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    box-shadow: var(--bevel-wood);
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: var(--sp-7);
    align-items: center;
    position: relative;
  }
  .hero-display {
    font-family: var(--font-display);
    font-size: 96px;
    line-height: 0.9;
    letter-spacing: var(--ls-display);
    color: var(--gold-300);
    text-shadow:
      4px 4px 0 var(--saddle-600),
      8px 8px 0 var(--ink-900);
    text-transform: uppercase;
    margin-bottom: var(--sp-3);
  }
  .hero-tag {
    font-family: var(--font-display);
    font-size: var(--fs-h4);
    color: var(--parchment-200);
    text-shadow: 2px 2px 0 var(--saddle-600);
    margin-bottom: var(--sp-5);
    letter-spacing: var(--ls-loose);
  }
  .hero-meta {
    display: flex; gap: var(--sp-3);
    flex-wrap: wrap;
  }
  .hero-piles {
    display: flex; align-items: end; justify-content: center;
    gap: var(--sp-4);
  }

  /* Quicklinks */
  .quicklink {
    background: var(--parchment-100);
    border: 4px solid var(--ink-900);
    padding: var(--sp-5);
    box-shadow: var(--sh-card-rest);
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    border-bottom-color: var(--ink-900);
    display: flex; flex-direction: column; gap: var(--sp-3);
    transition: transform var(--dur-quick), box-shadow var(--dur-quick);
  }
  .quicklink:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 0 0 var(--ink-900), var(--glow-gold);
  }
  .quicklink-num {
    font-family: var(--font-display);
    font-size: var(--fs-h2);
    color: var(--saddle-300);
    line-height: 1;
  }
  .quicklink-title {
    font-family: var(--font-display);
    font-size: var(--fs-h3);
    text-transform: uppercase;
    letter-spacing: var(--ls-loose);
    color: var(--ink-900);
    line-height: 1;
  }
  .quicklink-desc {
    font-family: var(--font-body);
    font-size: var(--fs-body);
    color: var(--saddle-400);
  }
  .quicklink-arrow {
    align-self: flex-end;
    font-family: var(--font-display);
    font-size: var(--fs-h3);
    color: var(--saddle-400);
  }

  /* DNA panel */
  .dna {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--sp-5);
  }
  .dna-card {
    background: var(--parchment-100);
    border: 4px solid var(--ink-900);
    padding: var(--sp-5);
    box-shadow: var(--sh-card-rest);
    position: relative;
  }
  .dna-card::before {
    content: ""; position: absolute; inset: 0;
    pointer-events: none;
    box-shadow: var(--bevel-light), var(--bevel-dark);
  }
  .dna-card .num {
    font-family: var(--font-display);
    font-size: var(--fs-display);
    color: var(--saddle-200);
    line-height: 0.9;
    margin-bottom: var(--sp-2);
  }
  .dna-card h4 {
    font-size: var(--fs-h4);
    text-transform: uppercase;
    letter-spacing: var(--ls-loose);
    margin-bottom: var(--sp-2);
  }
  .dna-card p {
    color: var(--saddle-400);
    font-size: var(--fs-body);
    line-height: 1.4;
    margin: 0;
  }
  @media (max-width: 900px) {
    .dna { grid-template-columns: 1fr; }
    .hero-grid { grid-template-columns: 1fr; }
    .hero-display { font-size: 64px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" data-presets="env,react">
const { useState } = React;

function Hero() {
  return (
    <div className="hero-banner">
      <div className="hero-grid">
        <div>
          <div className="eyebrow" style={{
            background: "var(--gold-300)",
            color: "var(--ink-900)",
            border: "2px solid var(--ink-900)",
            padding: "2px 8px",
            display: "inline-block",
            fontFamily: "var(--font-display)",
            fontSize: "var(--fs-small)",
            letterSpacing: "var(--ls-loose)",
            textTransform: "uppercase",
            marginBottom: "var(--sp-4)"
          }}>
            Design System v1.0
          </div>
          <div className="hero-display">Lucas<br/>Games</div>
          <div className="hero-tag">A pixel saloon for the wild west of mini-games</div>
          <div className="hero-meta">
            <span className="badge badge-gold">9 GAMES</span>
            <span className="badge badge-cactus">PIXEL · PS1 ERA</span>
            <span className="badge badge-crimson">BITMAP TYPE</span>
            <span className="badge">LIGHT MODE</span>
          </div>
        </div>
        <div className="hero-piles">
          <PlayingCard rank="A" suit="hearts" size="md" style={{transform:"rotate(-8deg) translateY(8px)"}} />
          <PlayingCard rank="K" suit="spades" size="md" style={{transform:"translateY(-8px)"}} />
          <PlayingCard rank="Q" suit="diamonds" size="md" style={{transform:"rotate(6deg)"}} />
          <div style={{display:"flex", flexDirection:"column", gap:"var(--sp-3)", marginLeft:"var(--sp-4)"}}>
            <Chip color="gold" size={56} />
            <Chip color="red"  size={56} stack={2} />
          </div>
        </div>
      </div>
    </div>
  );
}

function Quicklinks() {
  const links = [
    { num: "01", title: "Tokens", href: "tokens.html",
      desc: "Color, type, spacing, and the chunky pixel chrome that holds it all together." },
    { num: "02", title: "Components", href: "components.html",
      desc: "Buttons, panels, inputs, signs — the saloon's furniture." },
    { num: "03", title: "Games", href: "games.html",
      desc: "Cards, chips, dice, the coin. Every primitive a hand of poker needs." },
    { num: "04", title: "Screens", href: "screens.html",
      desc: "Home grid, in-game tables, leaderboard rows, full mock screens." },
  ];
  return (
    <div className="grid grid-4">
      {links.map(l => (
        <a key={l.href} href={l.href} className="quicklink">
          <div className="quicklink-num">{l.num}</div>
          <div className="quicklink-title">{l.title}</div>
          <div className="quicklink-desc">{l.desc}</div>
          <div className="quicklink-arrow">→</div>
        </a>
      ))}
    </div>
  );
}

function DNA() {
  const items = [
    { num: "1", title: "Cozy, not cold",
      desc: "Warm parchment, sun-faded saddle wood, lantern-gold accents. The opposite of black-glass crypto casinos." },
    { num: "2", title: "Beveled & nailed",
      desc: "Every surface has a chunky outline, a top highlight, a bottom shade. Buttons feel pressable. Wood feels heavy." },
    { num: "3", title: "Pixel-honest",
      desc: "Bitmap font everywhere. Hard corners. No anti-aliasing. Stepped edges. If pixels were good enough for the PS1, they're good enough for us." },
  ];
  return (
    <div className="dna">
      {items.map(i => (
        <div key={i.num} className="dna-card">
          <div className="num">{i.num}</div>
          <h4>{i.title}</h4>
          <p>{i.desc}</p>
        </div>
      ))}
    </div>
  );
}

function App() {
  return (
    <div data-screen-label="Home">
      <LG_Header current="index.html" />
      <main className="page">
        <Hero />

        <Section num="00" title="Wayfinding">
          <Quicklinks />
        </Section>

        <Section num="01" title="Visual DNA">
          <DNA />
        </Section>

        <Section num="02" title="The Cast">
          <div className="grid grid-3">
            <div className="panel">
              <div className="panel-title">Cards</div>
              <div className="row" style={{gap:"var(--sp-2)"}}>
                <PlayingCard rank="A" suit="spades" size="sm" />
                <PlayingCard rank="J" suit="hearts" size="sm" />
                <PlayingCard rank="7" suit="diamonds" size="sm" />
                <PlayingCard faceDown size="sm" />
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">Chips</div>
              <div className="row" style={{gap:"var(--sp-3)"}}>
                <Chip color="white" size={48} />
                <Chip color="red"   size={48} />
                <Chip color="blue"  size={48} />
                <Chip color="green" size={48} />
                <Chip color="black" size={48} />
                <Chip color="gold"  size={48} />
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">Dice & Coin</div>
              <div className="row" style={{gap:"var(--sp-3)"}}>
                <Die value={3} size={48} />
                <Die value={5} size={48} />
                <Die value={6} size={48} />
                <Coin side="heads" size={48} />
                <Coin side="tails" size={48} />
              </div>
            </div>
          </div>
        </Section>

        <Section num="03" title="On The Felt">
          <div className="row-lg" style={{flexWrap:"wrap"}}>
            <button className="btn btn-lg">Deal Me In</button>
            <button className="btn btn-wood btn-lg">Cash Out</button>
            <button className="btn btn-danger btn-lg">All In</button>
            <span className="sign">Saloon Open</span>
          </div>
        </Section>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
