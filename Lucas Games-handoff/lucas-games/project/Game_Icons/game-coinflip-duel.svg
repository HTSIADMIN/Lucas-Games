<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — GAME ICON: COIN FLIP DUEL -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- ground shadow -->
  <ellipse cx="24" cy="44" rx="20" ry="2" fill="#1a0f08" opacity="0.3"/>

  <!-- ===== LEFT COIN (gold) ===== -->
  <g>
    <!-- coin depth -->
    <ellipse cx="13" cy="26" rx="10" ry="10" fill="#1a0f08"/>
    <ellipse cx="13" cy="24" rx="10" ry="10" fill="#7a5510"/>
    <!-- coin face -->
    <ellipse cx="13" cy="22" rx="10" ry="10" fill="#1a0f08"/>
    <ellipse cx="13" cy="22" rx="9"  ry="9"  fill="#f5c842"/>
    <!-- highlight -->
    <ellipse cx="11" cy="18" rx="6" ry="3" fill="#ffd84d"/>
    <ellipse cx="10" cy="16" rx="3" ry="1" fill="#ffe9a8"/>
    <!-- inner ring -->
    <circle cx="13" cy="22" r="6.5" fill="none" stroke="#c8941d" stroke-width="1"/>
    <!-- H stamp -->
    <g fill="#7a5510">
      <rect x="10" y="19" width="1" height="6"/>
      <rect x="15" y="19" width="1" height="6"/>
      <rect x="11" y="21" width="4" height="2"/>
    </g>
  </g>

  <!-- ===== RIGHT COIN (silver-ish, leaning the other way) ===== -->
  <g>
    <!-- coin depth -->
    <ellipse cx="35" cy="26" rx="10" ry="10" fill="#1a0f08"/>
    <ellipse cx="35" cy="24" rx="10" ry="10" fill="#3d2418"/>
    <!-- coin face -->
    <ellipse cx="35" cy="22" rx="10" ry="10" fill="#1a0f08"/>
    <ellipse cx="35" cy="22" rx="9"  ry="9"  fill="#a87545"/>
    <!-- highlight -->
    <ellipse cx="37" cy="18" rx="6" ry="3" fill="#d4a574"/>
    <ellipse cx="38" cy="16" rx="3" ry="1" fill="#fbe9c4"/>
    <!-- inner ring -->
    <circle cx="35" cy="22" r="6.5" fill="none" stroke="#6b3f24" stroke-width="1"/>
    <!-- T stamp -->
    <g fill="#3d2418">
      <rect x="32" y="19" width="6" height="2"/>
      <rect x="34" y="19" width="2" height="6"/>
    </g>
  </g>

  <!-- ===== VS SPARK CLASH (center) ===== -->
  <!-- big star burst behind -->
  <g fill="#ffd84d">
    <rect x="22" y="14" width="4" height="2"/>
    <rect x="22" y="28" width="4" height="2"/>
    <rect x="20" y="16" width="2" height="2"/>
    <rect x="26" y="16" width="2" height="2"/>
    <rect x="20" y="26" width="2" height="2"/>
    <rect x="26" y="26" width="2" height="2"/>
    <rect x="18" y="20" width="2" height="4"/>
    <rect x="28" y="20" width="2" height="4"/>
  </g>
  <!-- inner brighter -->
  <g fill="#ffe9a8">
    <rect x="22" y="16" width="4" height="2"/>
    <rect x="22" y="26" width="4" height="2"/>
    <rect x="20" y="20" width="8" height="4"/>
  </g>
  <!-- white-hot core -->
  <rect x="22" y="20" width="4" height="4" fill="#fef6e4"/>

  <!-- ===== "VS" pixel text on the spark ===== -->
  <g fill="#1a0f08">
    <!-- V -->
    <rect x="20" y="20" width="1" height="2"/>
    <rect x="21" y="22" width="1" height="1"/>
    <rect x="22" y="20" width="1" height="2"/>
    <!-- S -->
    <rect x="25" y="20" width="2" height="1"/>
    <rect x="25" y="21" width="1" height="1"/>
    <rect x="25" y="22" width="2" height="1"/>
    <rect x="26" y="22" width="1" height="1"/>
    <rect x="25" y="23" width="2" height="1"/>
  </g>

  <!-- side spark dots -->
  <g fill="#ffd84d">
    <rect x="14" y="6"  width="1" height="1"/>
    <rect x="33" y="6"  width="1" height="1"/>
    <rect x="6"  y="34" width="1" height="1"/>
    <rect x="41" y="34" width="1" height="1"/>
  </g>
</svg>
