<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — GAME ICON: GOLDEN BOUNTY (Scratcher) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- ground shadow -->
  <ellipse cx="24" cy="44" rx="18" ry="2" fill="#1a0f08" opacity="0.3"/>

  <!-- ===== TICKET (wanted poster style, slightly tilted) ===== -->
  <g transform="translate(6 4) rotate(-4 18 22)">
    <!-- shadow -->
    <rect x="2"  y="2"  width="32" height="40" fill="#1a0f08" opacity="0.3"/>
    <!-- outline -->
    <rect x="0"  y="0"  width="32" height="40" fill="#1a0f08"/>
    <!-- parchment body -->
    <rect x="1"  y="1"  width="30" height="38" fill="#fbe9c4"/>
    <!-- inner border -->
    <rect x="3"  y="3"  width="26" height="34" fill="none" stroke="#1a0f08" stroke-width="1"/>
    <!-- top highlight -->
    <rect x="1"  y="1"  width="30" height="1"  fill="#fef6e4"/>

    <!-- "★ WANTED ★" text band -->
    <g fill="#1a0f08">
      <!-- left star -->
      <rect x="5"  y="5" width="1" height="1"/>
      <rect x="4"  y="6" width="3" height="1"/>
      <rect x="5"  y="7" width="1" height="1"/>
      <!-- WANTED letters (compact) -->
      <rect x="9"  y="5" width="1" height="3"/>
      <rect x="11" y="5" width="1" height="3"/>
      <rect x="10" y="7" width="1" height="1"/>
      <rect x="13" y="5" width="3" height="1"/>
      <rect x="13" y="6" width="1" height="2"/>
      <rect x="15" y="6" width="1" height="2"/>
      <rect x="17" y="5" width="3" height="1"/>
      <rect x="18" y="6" width="1" height="2"/>
      <rect x="21" y="5" width="3" height="1"/>
      <rect x="22" y="6" width="1" height="2"/>
      <rect x="25" y="5" width="2" height="1"/>
      <rect x="25" y="6" width="1" height="1"/>
      <rect x="25" y="7" width="2" height="1"/>
      <!-- right star -->
      <rect x="27" y="5" width="1" height="1"/>
      <rect x="26" y="6" width="3" height="1"/>
      <rect x="27" y="7" width="1" height="1"/>
    </g>

    <!-- bounty area (gold panel, partially scratched) -->
    <rect x="6"  y="11" width="20" height="14" fill="#c8941d"/>
    <!-- silver scratch coating (with scratch reveals) -->
    <g fill="#a87545">
      <rect x="6"  y="11" width="20" height="14"/>
    </g>
    <!-- scratched reveals (showing gold beneath) -->
    <g fill="#ffd84d">
      <rect x="9"  y="13" width="6"  height="3"/>
      <rect x="8"  y="14" width="8"  height="1"/>
      <rect x="17" y="15" width="5"  height="2"/>
      <rect x="11" y="19" width="4"  height="2"/>
      <rect x="18" y="20" width="6"  height="2"/>
    </g>
    <!-- gold sparkle in revealed area -->
    <g fill="#fef6e4">
      <rect x="11" y="14" width="1" height="1"/>
      <rect x="19" y="16" width="1" height="1"/>
      <rect x="13" y="20" width="1" height="1"/>
    </g>
    <!-- scratch dust/specks at edges -->
    <g fill="#3d2418" opacity="0.6">
      <rect x="7"  y="12" width="1" height="1"/>
      <rect x="22" y="12" width="1" height="1"/>
      <rect x="23" y="22" width="2" height="1"/>
      <rect x="7"  y="22" width="2" height="1"/>
    </g>

    <!-- BOUNTY label below -->
    <g fill="#1a0f08">
      <rect x="6"  y="28" width="1" height="3"/>
      <rect x="7"  y="28" width="2" height="1"/>
      <rect x="8"  y="29" width="1" height="1"/>
      <rect x="7"  y="30" width="2" height="1"/>
      <rect x="11" y="28" width="2" height="1"/>
      <rect x="11" y="29" width="1" height="2"/>
      <rect x="13" y="28" width="1" height="3"/>
      <rect x="15" y="28" width="3" height="1"/>
      <rect x="15" y="29" width="1" height="2"/>
      <rect x="17" y="29" width="1" height="2"/>
    </g>
    <!-- amount $$ -->
    <g fill="#c8941d">
      <rect x="20" y="28" width="2" height="3"/>
      <rect x="23" y="28" width="2" height="3"/>
    </g>
    <!-- bottom corner stars -->
    <g fill="#1a0f08">
      <rect x="5"  y="34" width="1" height="1"/>
      <rect x="4"  y="35" width="3" height="1"/>
      <rect x="5"  y="36" width="1" height="1"/>
      <rect x="27" y="34" width="1" height="1"/>
      <rect x="26" y="35" width="3" height="1"/>
      <rect x="27" y="36" width="1" height="1"/>
    </g>
  </g>

  <!-- ===== SCRATCHING COIN (overlapping bottom-right corner of ticket) ===== -->
  <g transform="translate(28 28)">
    <ellipse cx="8" cy="9" rx="8" ry="8" fill="#1a0f08"/>
    <ellipse cx="8" cy="8" rx="8" ry="8" fill="#1a0f08"/>
    <ellipse cx="8" cy="8" rx="7" ry="7" fill="#f5c842"/>
    <!-- highlight -->
    <ellipse cx="6" cy="6" rx="3" ry="2" fill="#ffd84d"/>
    <!-- $ stamp -->
    <g fill="#7a5510">
      <rect x="7"  y="4"  width="2" height="9"/>
      <rect x="5"  y="5"  width="6" height="1"/>
      <rect x="5"  y="8"  width="6" height="1"/>
      <rect x="5"  y="11" width="6" height="1"/>
    </g>
  </g>

  <!-- scratch dust trailing from coin -->
  <g fill="#a87545" opacity="0.7">
    <rect x="36" y="32" width="1" height="1"/>
    <rect x="38" y="34" width="1" height="1"/>
    <rect x="35" y="36" width="2" height="1"/>
  </g>
</svg>
