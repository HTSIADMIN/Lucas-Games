<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — GAME ICON: BLACKJACK -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- felt patch (table hint) -->
  <ellipse cx="24" cy="42" rx="20" ry="3" fill="#1f3818" opacity="0.5"/>
  <ellipse cx="24" cy="40" rx="22" ry="6" fill="#3d6b2e"/>
  <ellipse cx="24" cy="40" rx="22" ry="6" fill="none" stroke="#1a0f08" stroke-width="1"/>
  <!-- felt highlight -->
  <ellipse cx="24" cy="38" rx="18" ry="2" fill="#6ba84f" opacity="0.6"/>

  <!-- ===== BACK CARD (A♠) — angled left ===== -->
  <g transform="translate(8 6) rotate(-12 11 16)">
    <!-- shadow -->
    <rect x="1" y="1" width="20" height="30" fill="#1a0f08" opacity="0.3"/>
    <!-- outline -->
    <rect x="0" y="0" width="20" height="30" fill="#1a0f08"/>
    <!-- body -->
    <rect x="1" y="1" width="18" height="28" fill="#fef6e4"/>
    <!-- inner highlight -->
    <rect x="1" y="1" width="18" height="1" fill="#ffffff"/>
    <!-- A in top-left -->
    <g fill="#1a0f08">
      <rect x="3" y="3" width="3" height="1"/>
      <rect x="2" y="4" width="1" height="4"/>
      <rect x="6" y="4" width="1" height="4"/>
      <rect x="2" y="6" width="5" height="1"/>
    </g>
    <!-- spade pip -->
    <g fill="#1a0f08">
      <rect x="2"  y="9"  width="3" height="1"/>
      <rect x="1"  y="10" width="5" height="2"/>
      <rect x="0"  y="11" width="7" height="1"/>
      <rect x="3"  y="13" width="1" height="1"/>
      <rect x="2"  y="14" width="3" height="1"/>
    </g>
    <!-- center spade (large) -->
    <g fill="#1a0f08">
      <rect x="9"  y="11" width="2" height="2"/>
      <rect x="8"  y="13" width="4" height="3"/>
      <rect x="7"  y="14" width="6" height="3"/>
      <rect x="9"  y="18" width="2" height="1"/>
      <rect x="8"  y="19" width="4" height="1"/>
    </g>
  </g>

  <!-- ===== FRONT CARD (K♥) — angled right ===== -->
  <g transform="translate(20 4) rotate(8 11 16)">
    <!-- shadow -->
    <rect x="1" y="1" width="20" height="30" fill="#1a0f08" opacity="0.3"/>
    <!-- outline -->
    <rect x="0" y="0" width="20" height="30" fill="#1a0f08"/>
    <!-- body -->
    <rect x="1" y="1" width="18" height="28" fill="#fef6e4"/>
    <rect x="1" y="1" width="18" height="1" fill="#ffffff"/>
    <!-- K in top-left -->
    <g fill="#e05a3c">
      <rect x="2" y="3" width="1" height="5"/>
      <rect x="6" y="3" width="1" height="1"/>
      <rect x="5" y="4" width="1" height="1"/>
      <rect x="4" y="5" width="1" height="1"/>
      <rect x="3" y="6" width="1" height="1"/>
      <rect x="4" y="6" width="1" height="1"/>
      <rect x="5" y="7" width="1" height="1"/>
      <rect x="6" y="7" width="1" height="1"/>
    </g>
    <!-- heart pip top -->
    <g fill="#e05a3c">
      <rect x="2" y="9"  width="2" height="1"/>
      <rect x="5" y="9"  width="2" height="1"/>
      <rect x="1" y="10" width="7" height="2"/>
      <rect x="2" y="12" width="5" height="1"/>
      <rect x="3" y="13" width="3" height="1"/>
      <rect x="4" y="14" width="1" height="1"/>
    </g>
    <!-- center heart (large) -->
    <g fill="#e05a3c">
      <rect x="7"  y="13" width="2" height="2"/>
      <rect x="11" y="13" width="2" height="2"/>
      <rect x="6"  y="14" width="8" height="3"/>
      <rect x="7"  y="17" width="6" height="2"/>
      <rect x="8"  y="19" width="4" height="1"/>
      <rect x="9"  y="20" width="2" height="1"/>
    </g>
    <!-- heart highlight -->
    <rect x="8" y="14" width="2" height="1" fill="#ffb8a8"/>
  </g>
</svg>
