<?xml version="1.0" encoding="UTF-8"?>
<!-- Lucas Games — GAME ICON: DICE -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- felt patch -->
  <ellipse cx="24" cy="42" rx="20" ry="3" fill="#1f3818" opacity="0.5"/>

  <!-- ===== BACK DIE (smaller, top-right, showing 6) ===== -->
  <g transform="translate(26 6)">
    <!-- shadow -->
    <rect x="2"  y="14" width="14" height="2" fill="#1a0f08" opacity="0.4"/>
    <!-- right side (depth) -->
    <polygon points="14,2 16,4 16,16 14,14" fill="#c8941d"/>
    <!-- top (depth) -->
    <polygon points="2,2 14,2 16,4 4,4" fill="#ffe9a8"/>
    <!-- front face -->
    <rect x="2"  y="4"  width="13" height="11" fill="#fef6e4"/>
    <!-- outline -->
    <rect x="2"  y="4"  width="13" height="11" fill="none" stroke="#1a0f08" stroke-width="1"/>
    <polygon points="2,2 14,2 16,4 16,16 15,15 15,4 14,3 3,3" fill="#1a0f08"/>
    <polygon points="2,2 14,2 14,3 3,3" fill="#1a0f08"/>
    <!-- 6 pips -->
    <g fill="#1a0f08">
      <rect x="4"  y="6"  width="2" height="2"/>
      <rect x="11" y="6"  width="2" height="2"/>
      <rect x="4"  y="9"  width="2" height="2"/>
      <rect x="11" y="9"  width="2" height="2"/>
      <rect x="4"  y="12" width="2" height="2"/>
      <rect x="11" y="12" width="2" height="2"/>
    </g>
    <!-- pip highlight -->
    <g fill="#1a0f08" opacity="0.5">
      <rect x="4"  y="8"  width="2" height="1"/>
      <rect x="11" y="8"  width="2" height="1"/>
    </g>
  </g>

  <!-- ===== FRONT DIE (bigger, bottom-left, showing 5) ===== -->
  <g transform="translate(4 18)">
    <!-- ground shadow -->
    <ellipse cx="11" cy="26" rx="13" ry="2" fill="#1a0f08" opacity="0.5"/>

    <!-- right depth side -->
    <polygon points="20,2 22,4 22,22 20,20" fill="#c8941d"/>
    <!-- top depth -->
    <polygon points="2,2 20,2 22,4 4,4" fill="#ffe9a8"/>
    <!-- front face -->
    <rect x="2"  y="4"  width="19" height="17" fill="#fef6e4"/>
    <!-- outline -->
    <rect x="2"  y="4"  width="19" height="17" fill="none" stroke="#1a0f08" stroke-width="1"/>
    <polygon points="2,2 20,2 22,4 22,22 21,21 21,4 20,3 3,3" fill="#1a0f08"/>
    <polygon points="2,2 20,2 20,3 3,3" fill="#1a0f08"/>
    <!-- 5 pips (4 corners + center) -->
    <g fill="#1a0f08">
      <rect x="4"  y="6"  width="3" height="3"/>
      <rect x="16" y="6"  width="3" height="3"/>
      <rect x="10" y="11" width="3" height="3"/>
      <rect x="4"  y="16" width="3" height="3"/>
      <rect x="16" y="16" width="3" height="3"/>
    </g>
    <!-- pip highlights (top edge of each pip) -->
    <g fill="#1a0f08" opacity="0.5">
      <rect x="4"  y="9"  width="3" height="1"/>
      <rect x="16" y="9"  width="3" height="1"/>
      <rect x="10" y="14" width="3" height="1"/>
    </g>
  </g>

  <!-- motion lines (small, behind dice) -->
  <g fill="#fef6e4" opacity="0.6">
    <rect x="1"  y="22" width="3" height="1"/>
    <rect x="44" y="14" width="3" height="1"/>
    <rect x="0"  y="30" width="2" height="1"/>
  </g>
</svg>
