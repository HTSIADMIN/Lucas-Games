<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lucas Games — BUILDING T1: TENT  (1.5×)
  Humble canvas teepee — start of the boom.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- ground shadow -->
  <ellipse cx="16" cy="28" rx="13" ry="1.4" fill="#1a0f08" opacity="0.30"/>

  <!-- ground line -->
  <rect x="1" y="26" width="30" height="1" fill="#6b3f24" opacity="0.5"/>

  <!-- guy ropes / stakes -->
  <rect x="1"  y="24" width="3" height="1" fill="#6b3f24"/>
  <rect x="28" y="24" width="3" height="1" fill="#6b3f24"/>
  <rect x="0"  y="25" width="2" height="1" fill="#1a0f08"/>
  <rect x="30" y="25" width="2" height="1" fill="#1a0f08"/>

  <!-- ===== TENT BODY ===== -->
  <!-- right slope (shadow side) -->
  <polygon points="16,8 28,25 16,25" fill="#e8c089"/>
  <!-- left slope (lit side) -->
  <polygon points="16,8 4,25 16,25" fill="#fbe9c4"/>
  <!-- outline -->
  <polygon points="16,7 4,25 28,25"
           fill="none" stroke="#1a0f08" stroke-width="1"/>

  <!-- center seam -->
  <rect x="16" y="8" width="1" height="17" fill="#a87545"/>

  <!-- door flap (dark V interior) -->
  <polygon points="16,16 13,25 19,25" fill="#3d2418"/>
  <!-- door fold pulled aside -->
  <rect x="13" y="22" width="1" height="3" fill="#6b3f24"/>
  <rect x="18" y="22" width="1" height="3" fill="#6b3f24"/>

  <!-- canvas seam stitches -->
  <g fill="#a87545">
    <rect x="11" y="16" width="1" height="1"/>
    <rect x="9"  y="20" width="1" height="1"/>
    <rect x="20" y="16" width="1" height="1"/>
    <rect x="22" y="20" width="1" height="1"/>
  </g>

  <!-- ===== POLE + PENNANT ===== -->
  <!-- crossed top poles -->
  <rect x="14" y="6" width="1" height="3" fill="#6b3f24"/>
  <rect x="17" y="6" width="1" height="3" fill="#6b3f24"/>
  <rect x="13" y="5" width="1" height="2" fill="#6b3f24"/>
  <rect x="18" y="5" width="1" height="2" fill="#6b3f24"/>
  <!-- pennant pole -->
  <rect x="16" y="2" width="1" height="6" fill="#1a0f08"/>
  <!-- pennant flag -->
  <rect x="17" y="2" width="5" height="3" fill="#e05a3c"/>
  <rect x="22" y="3" width="1" height="1" fill="#e05a3c"/>
  <rect x="17" y="2" width="5" height="1" fill="#8b3a3a"/>
  <rect x="17" y="4" width="5" height="1" fill="#8b3a3a"/>
</svg>
